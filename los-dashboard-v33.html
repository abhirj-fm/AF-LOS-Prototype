    // ─── Auto Assignment Module ───────────────────────────────────────────────
    const AutoAssignmentModule = ({ currentUser }) => {
      const { state, dispatch } = useStore();
      const [selectedStage, setSelectedStage] = useState('Application Review');
      const [localConfig, setLocalConfig] = useState(null);
      const [savedConfig, setSavedConfig] = useState(null); // snapshot of last saved state
      const [saveError, setSaveError] = useState('');
      const [saveSuccess, setSaveSuccess] = useState(false);
      // Per-user reassign opt-in: { [userId]: true } means "reassign their cases on save"
      const [reassignFlags, setReassignFlags] = useState({});

      const userRoles = currentUser?.roles || [currentUser?.role];
      const isReadOnly = !userRoles.some(r => ['ADMIN_OPS','ADMIN_HEAD'].includes(r));

      // Load stage config into local editable state when stage changes
      useEffect(() => {
        const cfg = state.assignmentConfig[selectedStage];
        if(cfg) {
          const snap = { roles: [...cfg.roles], weights: { ...cfg.weights } };
          setLocalConfig(snap);
          setSavedConfig(snap);
          setReassignFlags({});
          setSaveError('');
          setSaveSuccess(false);
        }
      }, [selectedStage, state.assignmentConfig]);

      const allWorkRoles = ['ARO','UW','OM','FM'];

      // Get eligible users for local config roles
      const getEligibleUsers = (roles) =>
        state.users.filter(u => {
          const uRoles = u.roles || [u.role];
          return roles.some(r => uRoles.includes(r));
        });

      const eligibleUsers = localConfig ? getEligibleUsers(localConfig.roles) : [];
      const weightTotal = localConfig
        ? eligibleUsers.reduce((sum, u) => sum + (Number(localConfig.weights[u.id]) || 0), 0)
        : 0;

      // Dirty check: has anything changed from the saved snapshot?
      const isDirty = (() => {
        if(!localConfig || !savedConfig) return false;
        if(localConfig.roles.join(',') !== savedConfig.roles.join(',')) return true;
        const allIds = new Set([...Object.keys(localConfig.weights), ...Object.keys(savedConfig.weights)]);
        for(const id of allIds) {
          if((localConfig.weights[id]||0) !== (savedConfig.weights[id]||0)) return true;
        }
        return false;
      })();

      const handleRoleToggle = (role) => {
        if(!localConfig) return;
        const newRoles = localConfig.roles.includes(role)
          ? localConfig.roles.filter(r => r !== role)
          : [...localConfig.roles, role];
        const newEligible = getEligibleUsers(newRoles);
        const newWeights = { ...localConfig.weights };
        newEligible.forEach(u => { if(newWeights[u.id] === undefined) newWeights[u.id] = 0; });
        setLocalConfig({ roles: newRoles, weights: newWeights });
        setSaveError(''); setSaveSuccess(false);
      };

      const handleWeightChange = (userId, val) => {
        const num = Math.max(0, Math.min(100, parseInt(val) || 0));
        setLocalConfig(c => ({ ...c, weights: { ...c.weights, [userId]: num } }));
        // If weight goes back to non-zero, clear any reassign flag
        if(num > 0) setReassignFlags(f => { const n={...f}; delete n[userId]; return n; });
        setSaveError(''); setSaveSuccess(false);
      };

      const handleReassignToggle = (userId) => {
        setReassignFlags(f => ({ ...f, [userId]: !f[userId] }));
      };

      const handleSave = () => {
        if(weightTotal !== 100) {
          setSaveError(`Weights must sum to 100%. Current total: ${weightTotal}%.`);
          setSaveSuccess(false);
          return;
        }
        // ── Process reassignments for opted-in zero-weight users ─────────
        const usersToReassign = eligibleUsers.filter(u =>
          (Number(localConfig.weights[u.id]) || 0) === 0 && reassignFlags[u.id]
        );
        if(usersToReassign.length > 0) {
          // Active users with weight > 0 are the recipients
          const recipients = eligibleUsers.filter(u => (Number(localConfig.weights[u.id]) || 0) > 0);
          const totalRecipientWeight = recipients.reduce((s, u) => s + (Number(localConfig.weights[u.id]) || 0), 0);
          usersToReassign.forEach(zeroUser => {
            // Find all apps currently assigned to this user
            const appsToMove = state.applications.filter(a => a.backOfficeUser === zeroUser.name);
            appsToMove.forEach(app => {
              // Pick recipient proportionally (most under-allocated)
              const counts = {};
              recipients.forEach(r => { counts[r.name] = 0; });
              state.applications.forEach(a => {
                if(a.backOfficeUser && counts.hasOwnProperty(a.backOfficeUser)) counts[a.backOfficeUser]++;
              });
              const total = Object.values(counts).reduce((a,b)=>a+b,0);
              let best = null, bestScore = -Infinity;
              recipients.forEach(r => {
                const target = (Number(localConfig.weights[r.id])||0) / 100;
                const actual = total > 0 ? (counts[r.name]||0)/total : 0;
                const score = target - actual;
                if(score > bestScore) { bestScore = score; best = r; }
              });
              if(best) {
                dispatch({ type:'UPDATE_APP', id:app.id, patch:{ backOfficeUser: best.name } });
                dispatch({ type:'ADD_EVENT', appId:app.id, event:{
                  id:`EVT-${Date.now()}-${app.id}`,
                  icon:'user-check', color:'amber',
                  description:`Reassigned from ${zeroUser.name} to ${best.name}`,
                  timestamp: new Date().toISOString(),
                  actor: currentUser?.name || 'System',
                  comment: `Triggered by admin setting ${zeroUser.name} to 0% in Auto Assignment`
                }});
              }
            });
          });
        }
        dispatch({ type:'SAVE_ASSIGNMENT_CONFIG', stageId: selectedStage, config: { ...localConfig } });
        const snap = { roles: [...localConfig.roles], weights: { ...localConfig.weights } };
        setSavedConfig(snap);
        setReassignFlags({});
        setSaveError('');
        setSaveSuccess(true);
        setTimeout(() => setSaveSuccess(false), 2500);
      };

      // Assignment stats for display
      const getAssignmentStats = (stageId) => {
        const cfg = state.assignmentConfig[stageId];
        if(!cfg) return [];
        return state.users
          .filter(u => {
            const uRoles = u.roles || [u.role];
            return cfg.roles.some(r => uRoles.includes(r));
          })
          .map(u => {
            const count = state.applications.filter(a => a.backOfficeUser === u.name).length;
            return { ...u, count, weight: cfg.weights[u.id] || 0 };
          });
      };

      const stageColors = {
        'Application Review': 'blue',
        'Credit Review':      'purple',
        'Approved':           'green',
        'Loan Ready':         'amber',
      };

      const stageBadge = (s) => {
        const c = stageColors[s];
        const map = { blue:'bg-blue-500/15 text-blue-300 border-blue-500/25', purple:'bg-purple-500/15 text-purple-300 border-purple-500/25', green:'bg-emerald-500/15 text-emerald-300 border-emerald-500/25', amber:'bg-amber-500/15 text-amber-300 border-amber-500/25' };
        return map[c] || map.blue;
      };

      return (
        <div className="space-y-6">
          <div className="flex items-start justify-between">
            <div>
              <h1 className="text-xl font-semibold text-white">Auto Assignment</h1>
              <p className="text-sm text-slate-400 mt-1">Configure weighted round-robin assignment for each pipeline stage.</p>
            </div>
            {isReadOnly && (
              <span className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-slate-700/40 border border-[#354e63] text-xs text-slate-400">
                <Icon name="eye" size={13}/> View Only
              </span>
            )}
          </div>

          <div className="grid grid-cols-12 gap-6">
            {/* ── Stage list ── */}
            <div className="col-span-3">
              <div className="bg-[#1e2d3d] border border-[#2d3f52] rounded-2xl overflow-hidden">
                <div className="px-4 py-3 border-b border-[#2d3f52]">
                  <p className="text-xs font-medium text-slate-400 uppercase tracking-wider">Stages</p>
                </div>
                {AUTO_ASSIGNMENT_STAGES.map(stage => {
                  const stats = getAssignmentStats(stage.id);
                  const active = stats.filter(u => u.weight > 0).length;
                  const isSelected = selectedStage === stage.id;
                  return (
                    <button key={stage.id} onClick={() => { setSelectedStage(stage.id); setSaveError(''); setSaveSuccess(false); }}
                      className={`w-full px-4 py-3.5 text-left border-b border-[#2d3f52] last:border-0 transition-colors ${isSelected ? 'bg-[#253040]' : 'hover:bg-[#253040]/50'}`}>
                      <div className="flex items-center justify-between">
                        <span className={`text-sm font-medium ${isSelected ? 'text-white' : 'text-slate-300'}`}>{stage.id}</span>
                        {isSelected && <Icon name="chevron-right" size={14} className="text-emerald-400"/>}
                      </div>
                      <p className="text-xs text-slate-500 mt-0.5">{active} active user{active !== 1 ? 's' : ''}</p>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* ── Config panel ── */}
            <div className="col-span-9 space-y-5">
              {localConfig && (
                <>
                  {/* Stage header */}
                  <div className="flex items-center gap-3">
                    <span className={`px-3 py-1 rounded-full text-xs font-medium border ${stageBadge(selectedStage)}`}>{selectedStage}</span>
                    <span className="text-sm text-slate-400">stage configuration</span>
                  </div>

                  {/* Role mapping */}
                  <div className="bg-[#1e2d3d] border border-[#2d3f52] rounded-2xl p-5">
                    <div className="flex items-start justify-between mb-4">
                      <div>
                        <p className="text-sm font-medium text-white">Role Mapping</p>
                        <p className="text-xs text-slate-400 mt-0.5">Users with these roles will be included in this stage's assignment pool.</p>
                      </div>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {allWorkRoles.map(role => {
                        const active = localConfig.roles.includes(role);
                        return (
                          <button key={role} onClick={() => !isReadOnly && handleRoleToggle(role)} disabled={isReadOnly}
                            className={`flex items-center gap-2 px-3.5 py-2 rounded-xl border text-sm font-medium transition-colors ${active ? 'bg-emerald-500/15 border-emerald-500/30 text-emerald-300' : 'bg-[#253040] border-[#354e63] text-slate-400'} ${!isReadOnly ? 'cursor-pointer' : 'cursor-default'}`}>
                            <div className={`w-3.5 h-3.5 rounded-sm border flex items-center justify-center flex-shrink-0 ${active ? 'bg-emerald-500 border-emerald-500' : 'border-slate-500'}`}>
                              {active && <Icon name="check" size={10}/>}
                            </div>
                            {role}
                          </button>
                        );
                      })}
                    </div>
                    {localConfig.roles.length === 0 && (
                      <p className="text-xs text-amber-400 mt-3 flex items-center gap-1.5"><Icon name="alert-triangle" size={13}/> At least one role must be selected.</p>
                    )}
                  </div>

                  {/* Weight distribution */}
                  <div className="bg-[#1e2d3d] border border-[#2d3f52] rounded-2xl p-5">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <p className="text-sm font-medium text-white">Assignment Weights</p>
                        <p className="text-xs text-slate-400 mt-0.5">Set the % of new cases each user should receive. Set to 0% for absent users.</p>
                      </div>
                      <div className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-sm font-semibold ${weightTotal === 100 ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-red-500/10 border-red-500/30 text-red-400'}`}>
                        {weightTotal}% <span className="text-xs font-normal opacity-70">/ 100%</span>
                      </div>
                    </div>

                    {eligibleUsers.length === 0 ? (
                      <p className="text-sm text-slate-500 text-center py-6">No users found for selected roles.</p>
                    ) : (
                      <div className="space-y-3">
                        {eligibleUsers.map(u => {
                          const w = Number(localConfig.weights[u.id]) || 0;
                          const assignedCount = state.applications.filter(a => a.backOfficeUser === u.name).length;
                          const uRoles = u.roles || [u.role];
                          const wasActive = (Number(savedConfig?.weights?.[u.id]) || 0) > 0;
                          const justZeroed = !isReadOnly && w === 0 && wasActive && assignedCount > 0;
                          const willReassign = !!reassignFlags[u.id];
                          return (
                            <div key={u.id} className={`rounded-xl border transition-all ${u.status === 'Inactive' ? 'border-[#2d3f52] bg-[#1a2332] opacity-60' : w === 0 && wasActive ? 'border-amber-500/30 bg-[#253040]' : 'border-[#2d3f52] bg-[#253040]'}`}>
                              <div className="flex items-center gap-4 p-3.5">
                                <div className="flex-1 min-w-0">
                                  <div className="flex items-center gap-2">
                                    <p className="text-sm font-medium text-white truncate">{u.name}</p>
                                    {u.status === 'Inactive' && <span className="text-xs text-slate-500 bg-slate-700/50 px-1.5 py-0.5 rounded">Inactive</span>}
                                    {w === 0 && wasActive && <span className="text-xs text-amber-400 bg-amber-500/10 border border-amber-500/20 px-1.5 py-0.5 rounded">Set to 0%</span>}
                                  </div>
                                  <div className="flex items-center gap-2 mt-0.5">
                                    <p className="text-xs text-slate-400">{u.email}</p>
                                    <span className="text-slate-600">·</span>
                                    <p className="text-xs text-slate-500">{uRoles.join(', ')}</p>
                                  </div>
                                </div>
                                <div className="flex items-center gap-3 flex-shrink-0">
                                  <div className="text-right">
                                    <p className="text-xs text-slate-500">Assigned</p>
                                    <p className="text-sm font-semibold text-slate-300">{assignedCount}</p>
                                  </div>
                                  <div className="flex items-center gap-1.5">
                                    <input type="number" min="0" max="100" value={w}
                                      onChange={e => !isReadOnly && handleWeightChange(u.id, e.target.value)}
                                      disabled={isReadOnly}
                                      className="w-16 px-2 py-1.5 text-center bg-[#1e2d3d] border border-[#354e63] rounded-lg text-sm text-white font-medium disabled:opacity-50 focus:outline-none focus:border-emerald-500/50"/>
                                    <span className="text-sm text-slate-400">%</span>
                                  </div>
                                  <div className="w-24 h-2 bg-[#1a2332] rounded-full overflow-hidden">
                                    <div className={`h-full rounded-full transition-all ${w > 0 ? 'bg-gradient-to-r from-emerald-500 to-cyan-500' : 'bg-slate-700'}`}
                                      style={{width:`${Math.min(w,100)}%`}}/>
                                  </div>
                                </div>
                              </div>
                              {/* Reassign opt-in strip — only when user was active, is now 0%, and has existing cases */}
                              {justZeroed && (
                                <div className="mx-3.5 mb-3.5 p-3 rounded-lg bg-amber-500/8 border border-amber-500/20 flex items-center justify-between gap-3">
                                  <div>
                                    <p className="text-xs font-medium text-amber-300">{assignedCount} existing case{assignedCount!==1?'s':''} assigned to this user</p>
                                    <p className="text-xs text-amber-400/70 mt-0.5">Reassign to remaining active users proportionally?</p>
                                  </div>
                                  <button onClick={() => handleReassignToggle(u.id)}
                                    className={`flex items-center gap-2 px-3 py-1.5 rounded-lg border text-xs font-medium flex-shrink-0 transition-colors ${willReassign ? 'bg-amber-500/20 border-amber-500/40 text-amber-300' : 'bg-[#1e2d3d] border-[#354e63] text-slate-400 hover:border-amber-500/30 hover:text-amber-400'}`}>
                                    <div className={`w-3.5 h-3.5 rounded-sm border flex items-center justify-center ${willReassign ? 'bg-amber-500 border-amber-500' : 'border-slate-500'}`}>
                                      {willReassign && <Icon name="check" size={10}/>}
                                    </div>
                                    Reassign on save
                                  </button>
                                </div>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {/* Footer: error / save */}
                    {!isReadOnly && (
                      <div className="mt-4 pt-4 border-t border-[#2d3f52] flex items-center justify-between">
                        <div>
                          {saveError && <p className="text-xs text-red-400 flex items-center gap-1.5"><Icon name="alert-circle" size={13}/>{saveError}</p>}
                          {saveSuccess && <p className="text-xs text-emerald-400 flex items-center gap-1.5"><Icon name="check-circle" size={13}/>Configuration saved.</p>}
                        </div>
                        <button onClick={handleSave} disabled={!isDirty || localConfig.roles.length === 0}
                          className="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-white text-sm font-medium disabled:opacity-50 hover:opacity-90 transition-opacity">
                          <Icon name="save" size={14}/> Save Configuration
                        </button>
                      </div>
                    )}
                  </div>

                  {/* Assignment activity preview */}
                  <div className="bg-[#1e2d3d] border border-[#2d3f52] rounded-2xl p-5">
                    <p className="text-sm font-medium text-white mb-3">Current Assignment Load</p>
                    <div className="grid grid-cols-2 gap-3">
                      {getAssignmentStats(selectedStage).map(u => {
                        const target = u.weight;
                        const total = state.applications.length;
                        const actualPct = total > 0 ? Math.round((u.count / total) * 100) : 0;
                        return (
                          <div key={u.id} className="flex items-center gap-3 p-3 rounded-xl bg-[#253040] border border-[#2d3f52]">
                            <div className="w-8 h-8 rounded-lg bg-emerald-500/15 border border-emerald-500/20 flex items-center justify-center flex-shrink-0">
                              <span className="text-xs font-bold text-emerald-400">{u.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</span>
                            </div>
                            <div className="flex-1 min-w-0">
                              <p className="text-xs font-medium text-white truncate">{u.name}</p>
                              <div className="flex items-center gap-2 mt-1">
                                <div className="flex-1 h-1.5 bg-[#1a2332] rounded-full overflow-hidden">
                                  <div className="h-full bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-full"
                                    style={{width:`${Math.min(actualPct,100)}%`}}/>
                                </div>
                                <span className="text-xs text-slate-400 flex-shrink-0">{u.count} cases</span>
                              </div>
                            </div>
                            <div className="text-right flex-shrink-0">
                              <p className="text-xs text-slate-500">Target</p>
                              <p className="text-sm font-semibold text-slate-300">{target}%</p>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ─── Users Management ─────────────────────────────────────────────────────
    const UsersManagement = ({ currentUser }) => {
      const [users, setUsers] = useState(DEMO_USERS);
      const [showCreateModal, setShowCreateModal] = useState(false);
      const [showEditModal, setShowEditModal] = useState(false);
      const [editingUser, setEditingUser] = useState(null);
      const [editForm, setEditForm] = useState({ name:'', email:'', roles:[], status:'Active' });
      const [searchTerm, setSearchTerm] = useState('');
      const [createForm, setCreateForm] = useState({ name:'', email:'', roles:[], status:'Active' });

      const userRoles = currentUser?.roles || [currentUser?.role];
      const isAdminHead = userRoles.includes('ADMIN_HEAD');
      const isAdminOps = userRoles.includes('ADMIN_OPS');
      const isExternal = userRoles.includes('EXTERNAL') && !isAdminHead && !isAdminOps;
      const canManage = (isAdminHead || isAdminOps) && !isExternal;

      const filtered = users.filter(u => u.name.toLowerCase().includes(searchTerm.toLowerCase()) || u.email.toLowerCase().includes(searchTerm.toLowerCase()));

      const toggleStatus = (uid) => {
        setUsers(us=>us.map(u=>u.id===uid?{...u,status:u.status==='Active'?'Inactive':'Active'}:u));
      };
      const handleCreate = () => {
        if(!createForm.name||!createForm.email) return;
        if(!(createForm.roles||[]).length) return;
        setUsers(us=>[...us, { id:`u${Date.now()}`, name:createForm.name, email:createForm.email, roles:createForm.roles, role:createForm.roles[0], status:'Active', createdOn: new Date().toISOString().slice(0,10) }]);
        setCreateForm({ name:'', email:'', roles:[], status:'Active' });
        setShowCreateModal(false);
      };

      const openEdit = (user) => {
        setEditingUser(user);
        setEditForm({ name:user.name, email:user.email, roles:user.roles||[user.role], status:user.status });
        setShowEditModal(true);
      };
      const handleSaveEdit = () => {
        if(!editForm.name||!editForm.email||!editForm.roles.length) return;
        setUsers(us=>us.map(u=>u.id===editingUser.id?{...u,...editForm,role:editForm.roles[0]}:u));
        setShowEditModal(false);
      };

      return (
        <div className="space-y-6">
          <Header title="Users" subtitle={`${users.length} users · ${users.filter(u=>u.status==='Active').length} active`}
            actions={canManage&&<button onClick={()=>setShowCreateModal(true)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-medium text-sm"><Icon name="plus" size={16}/> Add User</button>} />

          <div className="bg-[#1e2d3d]/50 rounded-2xl border border-[#2d3f52] overflow-hidden">
            <div className="p-4 border-b border-[#2d3f52]">
              <div className="relative max-w-md">
                <Icon name="search" size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"/>
                <input type="text" placeholder="Search by name or email..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full pl-10 py-2.5 bg-[#253040] border border-[#354e63] rounded-xl text-sm text-white placeholder:text-slate-500"/>
              </div>
            </div>
            <div className="overflow-x-auto scrollbar-thin">
              <table className="w-full">
                <thead><tr className="border-b border-[#2d3f52]">
                  <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Name</th>
                  <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Email</th>
                  <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Role</th>
                  <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Created On</th>
                  <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Status</th>
                  {canManage&&<th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Actions</th>}
                </tr></thead>
                <tbody className="divide-y divide-slate-800/50">
                  {filtered.map(u=>(
                    <tr key={u.id} className="hover:bg-[#253040]/20">
                      <td className="px-4 py-4">
                        <div className="flex items-center gap-3">
                          <div className="w-8 h-8 rounded-full bg-gradient-to-br from-emerald-400 to-cyan-400 flex items-center justify-center text-slate-900 font-bold text-xs">{u.name.split(' ').map(n=>n[0]).join('').slice(0,2)}</div>
                          <span className="text-sm text-white font-medium">{u.name}</span>
                        </div>
                      </td>
                      <td className="px-4 py-4 text-sm text-slate-400">{u.email}</td>
                      <td className="px-4 py-4"><div className="flex flex-wrap gap-1">{(u.roles||[u.role]).map(r=><UserRoleBadge key={r} role={r}/>)}</div></td>
                      <td className="px-4 py-4 text-sm text-slate-400">{formatDate(u.createdOn)}</td>
                      <td className="px-4 py-4">
                        <span className={`px-2.5 py-1 rounded-full text-xs font-medium border ${u.status==='Active'?'bg-emerald-900/30 text-emerald-300 border-emerald-700/50':'bg-[#2d3f52]/30 text-slate-400 border-[#455e72]/50'}`}>{u.status}</span>
                      </td>
                      {canManage&&(
                        <td className="px-4 py-4">
                          <button onClick={()=>openEdit(u)} className="px-3 py-1.5 rounded-lg text-xs font-medium border transition-colors bg-[#253040] text-slate-300 border-[#455e72] hover:bg-[#2d3f52] hover:text-white flex items-center gap-1.5">
                            <Icon name="pencil" size={12}/> Edit
                          </button>
                        </td>
                      )}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Edit User Modal */}
          {showEditModal&&editingUser&&(
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80" onClick={()=>setShowEditModal(false)}>
              <div className="bg-[#1e2d3d] rounded-2xl border border-[#354e63] w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
                <div className="flex items-center justify-between mb-6"><h3 className="text-lg font-semibold text-white">Edit User</h3><button onClick={()=>setShowEditModal(false)} className="p-2 text-slate-400 hover:text-white"><Icon name="x" size={20}/></button></div>
                <div className="space-y-4">
                  <div><label className="text-xs text-slate-500 block mb-1">Full Name *</label><input type="text" value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white"/></div>
                  <div><label className="text-xs text-slate-500 block mb-1">Work Email *</label><input type="email" value={editForm.email} onChange={e=>setEditForm({...editForm,email:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white"/></div>
                  <div><label className="text-xs text-slate-500 block mb-1.5">Roles <span className="text-slate-600">(multi-select)</span></label>
                    <div className="bg-[#253040] border border-[#354e63] rounded-lg p-2 space-y-1 max-h-44 overflow-y-auto scrollbar-thin">
                      {Object.entries(ROLES).map(([k,v])=>(
                        <label key={k} className="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-[#2d3f52]/50 cursor-pointer">
                          <div onClick={()=>setEditForm(f=>({...f,roles:f.roles.includes(k)?f.roles.filter(r=>r!==k):[...f.roles,k]}))} className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 ${editForm.roles.includes(k)?'bg-emerald-500 border-emerald-500':'border-[#455e72]'}`}>{editForm.roles.includes(k)&&<Icon name="check" size={11}/>}</div>
                          <span className="text-sm text-slate-300">{v.label}</span>
                        </label>
                      ))}
                    </div>
                    {editForm.roles.length===0&&<p className="text-xs text-amber-400 mt-1">Select at least one role</p>}
                  </div>
                  <div><label className="text-xs text-slate-500 block mb-1">Status</label>
                    <div className="flex gap-2">
                      {['Active','Inactive'].map(s=>(
                        <button key={s} onClick={()=>setEditForm({...editForm,status:s})} className={`px-4 py-2 rounded-lg text-sm font-medium border ${editForm.status===s?(s==='Active'?'bg-emerald-500/20 text-emerald-400 border-emerald-500/30':'bg-red-500/20 text-red-400 border-red-500/30'):'bg-[#253040] text-slate-400 border-[#354e63]'}`}>{s}</button>
                      ))}
                    </div>
                  </div>
                </div>
                <div className="flex justify-end gap-3 mt-6 pt-6 border-t border-[#2d3f52]">
                  <button onClick={()=>setShowEditModal(false)} className="px-4 py-2 rounded-xl bg-[#253040] text-slate-400 border border-[#354e63] text-sm">Cancel</button>
                  <button onClick={handleSaveEdit} disabled={!editForm.name||!editForm.email||!editForm.roles.length} className="px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-medium text-sm disabled:opacity-50">Save Changes</button>
                </div>
              </div>
            </div>
          )}
          {/* Create User Modal */}
          {showCreateModal&&(
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80" onClick={()=>setShowCreateModal(false)}>
              <div className="bg-[#1e2d3d] rounded-2xl border border-[#354e63] w-full max-w-md p-6" onClick={e=>e.stopPropagation()}>
                <div className="flex items-center justify-between mb-6"><h3 className="text-lg font-semibold text-white">Add New User</h3><button onClick={()=>setShowCreateModal(false)} className="p-2 text-slate-400 hover:text-white"><Icon name="x" size={20}/></button></div>
                <div className="space-y-4">
                  <div><label className="text-xs text-slate-500 block mb-1">Full Name *</label><input type="text" value={createForm.name} onChange={e=>setCreateForm({...createForm,name:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white"/></div>
                  <div><label className="text-xs text-slate-500 block mb-1">Work Email *</label><input type="email" value={createForm.email} onChange={e=>setCreateForm({...createForm,email:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white"/></div>
                  <div><label className="text-xs text-slate-500 block mb-1.5">Roles <span className="text-slate-600">(multi-select)</span></label>
                    <div className="bg-[#253040] border border-[#354e63] rounded-lg p-2 space-y-1 max-h-44 overflow-y-auto scrollbar-thin">
                      {Object.entries(ROLES).map(([k,v])=>(
                        <label key={k} className="flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-[#2d3f52]/50 cursor-pointer">
                          <div onClick={()=>setCreateForm(f=>({...f, roles: (f.roles||[]).includes(k) ? (f.roles||[]).filter(r=>r!==k) : [...(f.roles||[]),k]}))} className={`w-4 h-4 rounded border flex items-center justify-center flex-shrink-0 ${(createForm.roles||[]).includes(k)?'bg-emerald-500 border-emerald-500':'border-[#455e72]'}`}>{(createForm.roles||[]).includes(k)&&<Icon name="check" size={11}/>}</div>
                          <span className="text-sm text-slate-300">{v.label}</span>
                        </label>
                      ))}
                    </div>
                    {(createForm.roles||[]).length===0&&<p className="text-xs text-amber-400 mt-1">Select at least one role</p>}
                  </div>
                  <p className="text-xs text-slate-500">New users are set to <strong className="text-emerald-400">Active</strong> by default. An invitation email will be sent to their work email.</p>
                </div>
                <div className="flex justify-end gap-3 mt-6 pt-6 border-t border-[#2d3f52]">
                  <button onClick={()=>setShowCreateModal(false)} className="px-4 py-2 rounded-xl bg-[#253040] text-slate-400 border border-[#354e63] text-sm">Cancel</button>
                  <button onClick={handleCreate} disabled={!createForm.name||!createForm.email||!(createForm.roles||[]).length} className="px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-medium text-sm disabled:opacity-50">Add User</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    // ─── Modals (Create Lead, Bulk Upload) ───────────────────────────────────
    const CreateLeadModal = ({ onClose, onCreate }) => {
      const [form, setForm] = useState({ name:'', phone:'', altPhone:'', homeAddress:'', productType:productTypes[0], brand:brands[0], area:areas[0], fieldOfficer:fieldOfficers[0], source:'Walk-in' });
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80" onClick={onClose}>
          <div className="bg-[#1e2d3d] rounded-2xl border border-[#354e63] w-full max-w-lg p-6" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-6"><h3 className="text-lg font-semibold text-white">Create New Lead</h3><button onClick={onClose} className="p-2 text-slate-400 hover:text-white"><Icon name="x" size={20}/></button></div>
            <div className="space-y-4">
              <div><label className="text-xs text-slate-500 block mb-1">Name *</label><input type="text" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white"/></div>
              <div><label className="text-xs text-slate-500 block mb-1">Phone *</label><input type="text" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white"/></div>
              <div><label className="text-xs text-slate-500 block mb-1">Home Address</label><input type="text" value={form.homeAddress} onChange={e=>setForm({...form,homeAddress:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white"/></div>
              <div className="grid grid-cols-2 gap-4">
                <div><label className="text-xs text-slate-500 block mb-1">Product</label><select value={form.productType} onChange={e=>setForm({...form,productType:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white">{productTypes.map(p=><option key={p} value={p}>{p}</option>)}</select></div>
                <div><label className="text-xs text-slate-500 block mb-1">Brand</label><select value={form.brand} onChange={e=>setForm({...form,brand:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white">{brands.map(b=><option key={b} value={b}>{b}</option>)}</select></div>
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div><label className="text-xs text-slate-500 block mb-1">Area</label><select value={form.area} onChange={e=>setForm({...form,area:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white">{areas.map(a=><option key={a} value={a}>{a}</option>)}</select></div>
                <div><label className="text-xs text-slate-500 block mb-1">Field Officer</label><select value={form.fieldOfficer} onChange={e=>setForm({...form,fieldOfficer:e.target.value})} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white">{fieldOfficers.map(f=><option key={f} value={f}>{f}</option>)}</select></div>
              </div>
            </div>
            <div className="flex justify-end gap-3 mt-6 pt-6 border-t border-[#2d3f52]">
              <button onClick={onClose} className="px-4 py-2 rounded-xl bg-[#253040] text-slate-400 border border-[#354e63]">Cancel</button>
              <button onClick={()=>{onCreate({...form,id:String(Date.now()),status:'Created',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),followUpDate:null});onClose();}} disabled={!form.name||!form.phone} className="px-4 py-2 rounded-xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-medium disabled:opacity-50">Create Lead</button>
            </div>
          </div>
        </div>
      );
    };

    const BulkUploadModal = ({ onClose }) => {
      const sample = `name,phone,field_officer,alt_phone,home_address,product,brand,area\nJohn Doe,+2348000000000,Ahmed Musa,,24 Bode Thomas St Lagos,Vehicle Finance,Toyota,Ikeja\n`;
      const sampleUrl = `data:text/csv;charset=utf-8,${encodeURIComponent(sample)}`;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4" onClick={onClose}>
          <div className="bg-[#1e2d3d] rounded-2xl border border-[#354e63] w-full max-w-xl p-6" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4"><h3 className="text-lg font-semibold text-white">Bulk Upload Leads (CSV)</h3><button onClick={onClose} className="p-2 text-slate-400 hover:text-white"><Icon name="x" size={20}/></button></div>
            <div className="space-y-4">
              <div className="p-4 rounded-xl bg-[#253040]/30 border border-[#354e63]">
                <p className="text-sm text-slate-200 font-medium">CSV fields</p>
                <p className="text-xs text-slate-500 mt-1">Required: <span className="text-slate-300">name, phone, field_officer, product, brand, area</span>. Optional: <span className="text-slate-300">alt_phone, home_address</span>.</p>
                <div className="mt-3"><a href={sampleUrl} download="leads_sample.csv" className="inline-flex items-center gap-2 px-3 py-2 rounded-lg bg-[#253040] border border-[#354e63] text-slate-200 text-sm hover:text-white"><Icon name="download" size={16}/> Download sample CSV</a></div>
              </div>
              <div className="p-4 rounded-xl bg-[#253040]/30 border border-[#354e63]">
                <p className="text-sm text-slate-200 font-medium">Upload CSV</p>
                <p className="text-xs text-slate-500 mt-1">Prototype note: upload does not create leads yet (no backend).</p>
                <div className="mt-3"><input type="file" accept=".csv" className="w-full text-sm text-slate-300 file:mr-3 file:px-4 file:py-2 file:rounded-lg file:border-0 file:bg-[#253040] file:text-slate-200 hover:file:text-white file:cursor-pointer"/></div>
              </div>
            </div>
            <div className="flex justify-end mt-6 pt-6 border-t border-[#2d3f52]"><button onClick={onClose} className="px-4 py-2 rounded-xl bg-[#253040] text-slate-400 border border-[#354e63]">Close</button></div>
          </div>
        </div>
      );
    };

    // ─── Role-aware getFilteredApplications ─────────────────────────────────
    const getRoleApplications = (applications, roles, userName) =>
      applications.filter(a => a.backOfficeUser === userName);

    // ─── Root app: owns the global store ─────────────────────────────────────
    const LOSDashboardInner = () => {
      const { state, dispatch } = useStore();
      const { applications, leads } = state;

      const [currentUser, setCurrentUser] = useState(null);
      const [activeTab, setActiveTab] = useState(null);
      const [selectedApplication, setSelectedApplication] = useState(null);
      const [selectedLead, setSelectedLead] = useState(null);
      const [appFilters, setAppFilters] = useState({ fieldOfficers:[], backOfficeUsers:[] });
      const [appStatusFilter, setAppStatusFilter] = useState(null);
      const [leadStatusFilter, setLeadStatusFilter] = useState(null);
      const [leadFilters, setLeadFilters] = useState({ fieldOfficers:[] });
      const [showCreateLead, setShowCreateLead] = useState(false);
      const [showBulkUpload, setShowBulkUpload] = useState(false);

      // When selectedApplication ID is set, always read the latest version from the store
      const currentApp = selectedApplication
        ? applications.find(a => a.id === selectedApplication.id) || selectedApplication
        : null;

      const handleLogin = (user) => {
        setCurrentUser(user);
        const roles = user.roles || [user.role];
        const hasWorkRole = roles.some(r => ['ARO','UW','OM','FM'].includes(r));
        const hasAdminRole = roles.some(r => ['ADMIN_OPS','ADMIN_HEAD'].includes(r));
        if (hasAdminRole) setActiveTab('applications');
        else if (hasWorkRole) setActiveTab('my-applications');
        else setActiveTab('applications');
      };

      const handleLogout = () => { setCurrentUser(null); setActiveTab(null); setSelectedApplication(null); };

      if (!currentUser) return <LoginScreen onLogin={handleLogin}/>;

      const role = currentUser.role;
      const userRoles = currentUser.roles || [role];
      const roleApps = getRoleApplications(applications, userRoles, currentUser.name);
      const canCreateLead = userRoles.some(r=>['ADMIN_OPS','ADMIN_HEAD'].includes(r));

      return (
        <div className="min-h-screen bg-[#1a2332]">
          <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} setSelectedItem={()=>{setSelectedApplication(null);setSelectedLead(null);}} currentUser={currentUser} onLogout={handleLogout}/>
          <main className="ml-56 p-8 min-h-screen">
            {/* Applications (full view - Admin Ops/Head/External) */}
            {activeTab==='applications'&&!selectedApplication&&(
              <>
                <Header title="Applications" subtitle={`${applications.length} total`}/>
                <StatusSummary data={applications} statuses={applicationStatuses} type="Applications" selectedStatus={appStatusFilter} onStatusSelect={setAppStatusFilter}/>
                <ApplicationsTable data={applications} onRowClick={setSelectedApplication} filters={appFilters} setFilters={setAppFilters} statusFilter={appStatusFilter} onStatusFilterChange={setAppStatusFilter} currentUser={currentUser}/>
              </>
            )}
            {/* Unassigned (sidebar module) */}
            {activeTab==='unassigned'&&!selectedApplication&&(
              <>
                <Header title="Unassigned Cases" subtitle="Cases missing officer assignments"/>
                <UnassignedSection data={applications} onRowClick={(app)=>{setSelectedApplication(app);}} fullPage={true}/>
              </>
            )}
            {/* My Applications (BO-filtered) */}
            {activeTab==='my-applications'&&!selectedApplication&&(
              <>
                <Header title="My Applications" subtitle={`${roleApps.length} cases assigned to me`}/>
                <StatusSummary data={roleApps} statuses={applicationStatuses} type="Applications" selectedStatus={appStatusFilter} onStatusSelect={setAppStatusFilter} hideZero={true}/>
                <ApplicationsTable data={roleApps} onRowClick={setSelectedApplication} filters={appFilters} setFilters={setAppFilters} statusFilter={appStatusFilter} onStatusFilterChange={setAppStatusFilter} currentUser={currentUser}/>
              </>
            )}
            {(activeTab==='applications'||activeTab==='my-applications'||activeTab==='unassigned')&&selectedApplication&&(
              <ApplicationDetail application={currentApp} onBack={()=>setSelectedApplication(null)} currentUser={currentUser}/>
            )}
            {/* Leads */}
            {activeTab==='leads'&&!selectedLead&&(
              <>
                <Header title="Leads" subtitle={`${leads.length} total`}
                  actions={canCreateLead&&<div className="flex items-center gap-3"><button onClick={()=>setShowBulkUpload(true)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-[#253040] border border-[#354e63] text-slate-200 font-medium text-sm hover:text-white"><Icon name="upload" size={16}/> Bulk Upload</button><button onClick={()=>setShowCreateLead(true)} className="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-medium text-sm"><Icon name="plus" size={16}/> Create Lead</button></div>}/>
                <StatusSummary data={leads} statuses={leadStatuses} type="Leads" selectedStatus={leadStatusFilter} onStatusSelect={setLeadStatusFilter}/>
                <LeadsTable data={leads} onRowClick={setSelectedLead} filters={leadFilters} setFilters={setLeadFilters} statusFilter={leadStatusFilter} onStatusFilterChange={setLeadStatusFilter}/>
              </>
            )}
            {activeTab==='leads'&&selectedLead&&<LeadDetail lead={selectedLead} onBack={()=>setSelectedLead(null)} onUpdate={u=>{dispatch({type:'UPDATE_LEAD',lead:u});setSelectedLead(u);}} currentUser={currentUser}/>}
            {/* Users */}
            {activeTab==='users'&&<UsersManagement currentUser={currentUser}/>}
            {activeTab==='auto-assignment'&&<AutoAssignmentModule currentUser={currentUser}/>}
          </main>
          {showCreateLead&&<CreateLeadModal onClose={()=>setShowCreateLead(false)} onCreate={l=>{dispatch({type:'CREATE_LEAD',lead:l});setShowCreateLead(false);}}/>}
          {showBulkUpload&&<BulkUploadModal onClose={()=>setShowBulkUpload(false)}/>}
        </div>
      );
    };

    const LOSDashboard = () => {
      const initialState = {
        applications: generateMockApplications(),
        leads: generateMockLeads(),
        users: DEMO_USERS,
        appStore: {},
        assignmentConfig: buildInitialAssignmentConfig(DEMO_USERS),
        // Track which apps have been assigned at each stage to prevent re-assignment
        assignedApps: {}, // { [appId]: Set of stage names already assigned }
      };
      const [state, dispatch] = useReducer(storeReducer, initialState);
      return (
        <StoreContext.Provider value={{ state, dispatch }}>
          <LOSDashboardInner />
        </StoreContext.Provider>
      );
    };

    ReactDOM.render(<LOSDashboard/>, document.getElementById('root'));
  </script>
</body>
</html>

    const { useState, useReducer, useRef, useEffect, createContext, useContext } = React;


    // ═══════════════════════════════════════════════════════════════════════
    // GLOBAL IN-SESSION STORE
    // Holds all mutable state so changes persist across navigation.
    // appStore[id] = { aidDocs, avdDocs, contractFiles, events,
    //                  customerPullDocs, customerOpsDocs, customerPullStatus,
    //                  customerBureauCsv, guarantorPullDocs, guarantorOpsDocs,
    //                  guarantorPullStatus, guarantorBureauCsv, guarantorBvn,
    //                  foUploadPermission }
    // ═══════════════════════════════════════════════════════════════════════
    const StoreContext = createContext(null);

    const storeReducer = (state, action) => {
      switch (action.type) {
        // ── Application core fields (status, assignees, details) ──────────
        case 'UPDATE_APP': {
          const apps = state.applications.map(a =>
            a.id === action.id ? { ...a, ...action.patch, updatedAt: new Date().toISOString() } : a
          );
          return { ...state, applications: apps };
        }
        // ── Bootstrap per-app sub-state on first open ────────────────────
        case 'INIT_APP_STORE': {
          if (state.appStore[action.id]) return state; // already initialised
          return {
            ...state,
            appStore: { ...state.appStore, [action.id]: action.data }
          };
        }
        // ── Generic patch for any appStore[id] key ───────────────────────
        case 'PATCH_APP_STORE': {
          const existing = state.appStore[action.id] || {};
          return {
            ...state,
            appStore: { ...state.appStore, [action.id]: { ...existing, ...action.patch } }
          };
        }
        // ── Document mutations ────────────────────────────────────────────
        case 'UPLOAD_DOC': {
          const { appId, section, docId, file } = action;
          const store = state.appStore[appId] || {};
          const key = section === 'aid' ? 'aidDocs' : 'avdDocs';
          const docs = (store[key] || []).map(d =>
            d.id === docId
              ? { ...d, files: [...(d.files||[]), { id: `${docId}-${Date.now()}`, name: file.name, size: file.size, url: file.__url || null }] }
              : d
          );
          return { ...state, appStore: { ...state.appStore, [appId]: { ...store, [key]: docs } } };
        }
        case 'DELETE_DOC': {
          const { appId, section, docId, fileId } = action;
          const store = state.appStore[appId] || {};
          const key = section === 'aid' ? 'aidDocs' : 'avdDocs';
          const docs = (store[key] || []).map(d =>
            d.id === docId ? { ...d, files: d.files.filter(f => f.id !== fileId) } : d
          );
          return { ...state, appStore: { ...state.appStore, [appId]: { ...store, [key]: docs } } };
        }
        // ── Contract files ───────────────────────────────────────────────
        case 'UPLOAD_CONTRACT': {
          const { appId, file } = action;
          const store = state.appStore[appId] || {};
          const contractFiles = [...(store.contractFiles || []),
            { id: `contract-${Date.now()}-${Math.random().toString(36).slice(2)}`, name: file.name, size: file.size, url: null }
          ];
          return { ...state, appStore: { ...state.appStore, [appId]: { ...store, contractFiles } } };
        }
        case 'DELETE_CONTRACT': {
          const { appId, fileId } = action;
          const store = state.appStore[appId] || {};
          const contractFiles = (store.contractFiles || []).filter(f => f.id !== fileId);
          return { ...state, appStore: { ...state.appStore, [appId]: { ...store, contractFiles } } };
        }
        // ── Credit ops docs ──────────────────────────────────────────────
        case 'UPLOAD_CREDIT_OPS': {
          const { appId, side, file } = action; // side: 'customer' | 'guarantor'
          const store = state.appStore[appId] || {};
          const key = side === 'customer' ? 'customerOpsDocs' : 'guarantorOpsDocs';
          const docs = [...(store[key]||[]), { id:`${side}-ops-${Date.now()}`, name:file.name, size:file.size, url:null }];
          return { ...state, appStore: { ...state.appStore, [appId]: { ...store, [key]: docs } } };
        }
        case 'DELETE_CREDIT_OPS': {
          const { appId, side, fileId } = action;
          const store = state.appStore[appId] || {};
          const key = side === 'customer' ? 'customerOpsDocs' : 'guarantorOpsDocs';
          const docs = (store[key]||[]).filter(f => f.id !== fileId);
          return { ...state, appStore: { ...state.appStore, [appId]: { ...store, [key]: docs } } };
        }
        // ── Events (activity history) ────────────────────────────────────
        case 'ADD_EVENT': {
          const { appId, event } = action;
          const store = state.appStore[appId] || {};
          const events = [event, ...(store.events || [])];
          return { ...state, appStore: { ...state.appStore, [appId]: { ...store, events } } };
        }
        // ── Leads ────────────────────────────────────────────────────────
        case 'UPDATE_LEAD':
          return { ...state, leads: state.leads.map(l => l.id === action.lead.id ? action.lead : l) };
        case 'CREATE_LEAD':
          return { ...state, leads: [action.lead, ...state.leads] };
        // ── Users ────────────────────────────────────────────────────────
        case 'UPDATE_USER':
          return { ...state, users: state.users.map(u => u.id === action.user.id ? action.user : u) };
        case 'CREATE_USER':
          return { ...state, users: [...state.users, action.user] };
        // ── Auto Assignment ───────────────────────────────────────────────
        case 'SAVE_ASSIGNMENT_CONFIG':
          return { ...state, assignmentConfig: { ...state.assignmentConfig, [action.stageId]: action.config } };
        case 'RECORD_ASSIGNMENT': {
          const prev = state.assignedApps[action.appId] || [];
          return { ...state, assignedApps: { ...state.assignedApps, [action.appId]: [...prev, action.stageId] } };
        }
        default:
          return state;
      }
    };

      if (!dateString) return '—';
      const date = new Date(dateString);
      return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;

      return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;

    const toPascal = s => s.replace(/(^\w|-\w)/g, c => c.replace('-','').toUpperCase());
    const Icon = ({ name, size = 18, className = "" }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (!iconRef.current) return;
        iconRef.current.innerHTML = '';
        try {
          const iconDef = lucide[toPascal(name)];
          if (!iconDef) return;
          const [,, children] = iconDef;
          const ns = 'http://www.w3.org/2000/svg';
          const svg = document.createElementNS(ns, 'svg');
          svg.setAttribute('width', size); svg.setAttribute('height', size);
          svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
          svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('stroke-width', '2');
          svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
          (children || []).forEach(([tag, attrs]) => {
            const el = document.createElementNS(ns, tag);
            Object.entries(attrs || {}).forEach(([k, v]) => el.setAttribute(k, v));
            svg.appendChild(el);
          });
          iconRef.current.appendChild(svg);
        } catch(e) {}
      }, [name, size]);
      return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ color: 'inherit' }} />;

      const cfg = {};
      AUTO_ASSIGNMENT_STAGES.forEach(stage => {
        const eligible = users.filter(u => {
          const userRoles = u.roles || [u.role];
          return stage.defaultRoles.some(r => userRoles.includes(r));
        });
        const weights = {};
        // Equal distribution across active users, inactive → 0
        const activeCount = eligible.filter(u=>u.status==='Active').length;
        let remaining = 100;
        eligible.forEach((u, i) => {
          if(u.status !== 'Active') { weights[u.id] = 0; return; }
          const isLast = i === eligible.length - 1 || eligible.slice(i+1).every(x=>x.status!=='Active');
          const share = isLast ? remaining : Math.floor(100/activeCount);
          weights[u.id] = share;
          remaining -= share;
        });
        cfg[stage.id] = { roles: [...stage.defaultRoles], weights };
      });
      return cfg;
    };

        'Created':'from-slate-600/20 to-slate-600/5 border-[#455e72]/30 text-slate-300',
        'Application':'from-indigo-500/20 to-indigo-500/5 border-indigo-500/30 text-indigo-300',
        'Not Interested':'from-gray-600/20 to-gray-600/5 border-gray-600/30 text-gray-300',
      };
      // Auto-select first status with count when hideZero is true and nothing selected
      useEffect(() => {
        if (hideZero && !selectedStatus && visibleStatuses.length > 0) {
          onStatusSelect(visibleStatuses[0]);
        }
      }, [data.length, hideZero]);

      if (visibleStatuses.length === 0) return (
        <div className="mb-6 p-4 rounded-xl bg-[#253040]/20 border border-[#354e63]/50 text-center">
          <p className="text-sm text-slate-500">No applications assigned to you yet.</p>
        </div>
      );
      return (
        <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-3 mb-6">
          {visibleStatuses.map(s => (
            <button key={s} onClick={()=>onStatusSelect(selectedStatus===s?null:s)}
              className={`p-3 rounded-xl border bg-gradient-to-b text-left transition-all ${colors[s]||'from-slate-700/20 to-slate-700/5 border-[#354e63]/30 text-slate-300'} ${selectedStatus===s?'ring-2 ring-offset-1 ring-offset-slate-950 ring-white/20 scale-[1.02]':'hover:scale-[1.01]'}`}>
              <p className="text-2xl font-bold">{counts[s]}</p>
              <p className="text-xs mt-1 opacity-80 leading-tight">{s}</p>
            </button>
          ))}
        </div>
      );
    };

    // ─── Unassigned Section ───────────────────────────────────────────────────
    const UnassignedSection = ({ data, onRowClick, fullPage }) => {
      const unassignedRO = data.filter(a => !a.recoveryOfficer);
      const unassignedFO = data.filter(a => !a.fieldOfficer);
      const unassignedBO = data.filter(a => !a.backOfficeUser && ['Application Review','Credit Review','Approved','Loan Ready','Disbursed'].includes(a.status));
      const [activeGroup, setActiveGroup] = useState('No Recovery Officer');

      const groups = [
        { label:'No Recovery Officer', count:unassignedRO.length, items:unassignedRO, desc:'Cases without a Recovery Officer assigned' },
        { label:'No Field Officer',    count:unassignedFO.length, items:unassignedFO, desc:'Cases without a Field Officer assigned' },
        { label:'No Back Office User', count:unassignedBO.length, items:unassignedBO, desc:'Active cases without a Back Office user' },
      ];
      const total = new Set([...unassignedRO, ...unassignedFO, ...unassignedBO].map(a=>a.id)).size;

      if (!fullPage) return null; // old inline usage removed

      return (
        <div className="space-y-4">
          {/* Summary cards */}
          <div className="grid grid-cols-3 gap-3">
            {groups.map(g => (
              <button key={g.label} onClick={()=>setActiveGroup(g.label)}
                className={`p-4 rounded-xl border text-left transition-all ${activeGroup===g.label?'bg-amber-900/20 border-amber-600/40':'bg-[#253040]/30 border-[#354e63]/50 hover:border-amber-700/30'}`}>
                <p className={`text-2xl font-bold ${g.count>0?'text-amber-300':'text-slate-500'}`}>{g.count}</p>
                <p className="text-sm font-medium text-white mt-1">{g.label}</p>
                <p className="text-xs text-slate-500 mt-0.5">{g.desc}</p>
              </button>
            ))}
          </div>
          {/* Table for active group */}
          {(() => {
            const grp = groups.find(g => g.label === activeGroup);
            if (!grp || grp.items.length === 0) return (
              <div className="p-8 rounded-xl bg-[#253040]/20 border border-[#354e63]/40 text-center">
                <Icon name="check-circle" size={32} className="text-emerald-400 mx-auto mb-2"/>
                <p className="text-sm text-slate-400">No unassigned cases in this category</p>
              </div>
            );
            return (
              <div className="bg-[#1e2d3d]/50 rounded-2xl border border-[#2d3f52] overflow-hidden">
                <div className="px-4 py-3 border-b border-[#2d3f52]">
                  <p className="text-sm font-medium text-white">{grp.label} <span className="text-slate-500">({grp.count})</span></p>
                </div>
                <div className="overflow-x-auto scrollbar-thin">
                  <table className="w-full">
                    <thead><tr className="border-b border-[#2d3f52]">
                      <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">User ID</th>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Name</th>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Phone</th>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Product</th>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Status</th>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Assignees</th>
                      <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Created</th>
                    </tr></thead>
                    <tbody className="divide-y divide-slate-800/50">
                      {grp.items.map(app => (
                        <tr key={app.id} onClick={()=>onRowClick(app)} className="hover:bg-[#253040]/30 cursor-pointer">
                          <td className="px-4 py-3 text-sm font-mono text-emerald-400">{app.id}</td>
                          <td className="px-4 py-3 text-sm text-white font-medium">{app.name}</td>
                          <td className="px-4 py-3 text-sm text-slate-400">{app.phone}</td>
                          <td className="px-4 py-3 text-sm"><p className="text-white">{app.productType}</p><p className="text-xs text-slate-500">{app.brand}</p></td>
                          <td className="px-4 py-3"><StatusBadge status={app.status}/></td>
                          <td className="px-4 py-3 text-sm">
                            <div className="space-y-0.5">
                              <p className="text-xs"><span className="text-slate-500">FO: </span><span className={app.fieldOfficer?'text-slate-300':'text-amber-400 italic'}>{app.fieldOfficer||'Unassigned'}</span></p>
                              <p className="text-xs"><span className="text-slate-500">RO: </span><span className={app.recoveryOfficer?'text-slate-300':'text-amber-400 italic'}>{app.recoveryOfficer||'Unassigned'}</span></p>
                              <p className="text-xs"><span className="text-slate-500">BO: </span><span className={app.backOfficeUser?'text-slate-300':'text-red-400 italic'}>{app.backOfficeUser||'Unassigned'}</span></p>
                            </div>
                          </td>
                          <td className="px-4 py-3 text-xs text-slate-400">{formatDate(app.createdAt)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })()}
        </div>
      );
    };

    // ─── Applications Table ───────────────────────────────────────────────────
    const ApplicationsTable = ({ data, onRowClick, filters, setFilters, statusFilter, onStatusFilterChange, currentUser }) => {
      const [searchTerm, setSearchTerm] = useState('');
      const [sortConfig, setSortConfig] = useState({ key:'createdAt', direction:'desc' });
      const [currentPage, setCurrentPage] = useState(1);
      const [showFilters, setShowFilters] = useState(false);
      const [dateFilters, setDateFilters] = useState({ createdFrom:null, createdTo:null, updatedFrom:null, updatedTo:null });
      const itemsPerPage = 10;
      const sortOptions = [{ key:'createdAt', label:'Created Date' },{ key:'updatedAt', label:'Updated Date' },{ key:'status', label:'Status' },{ key:'followUpDate', label:'Follow-up Date' }];

      const filteredData = data.filter(item => {
        const matchesSearch = item.name.toLowerCase().includes(searchTerm.toLowerCase()) || item.phone.includes(searchTerm) || item.id.includes(searchTerm);
        const matchesFO = filters.fieldOfficers.length===0||filters.fieldOfficers.includes(item.fieldOfficer);
        const matchesBO = filters.backOfficeUsers.length===0||filters.backOfficeUsers.includes(item.backOfficeUser);
        const matchesStatus = !statusFilter||item.status===statusFilter;
        const cd=new Date(item.createdAt), ud=new Date(item.updatedAt);
        return matchesSearch&&matchesFO&&matchesBO&&matchesStatus
          &&(!dateFilters.createdFrom||cd>=new Date(dateFilters.createdFrom))
          &&(!dateFilters.createdTo||cd<=new Date(dateFilters.createdTo))
          &&(!dateFilters.updatedFrom||ud>=new Date(dateFilters.updatedFrom))
          &&(!dateFilters.updatedTo||ud<=new Date(dateFilters.updatedTo));
      });

      const sortedData = [...filteredData].sort((a,b) => {
        if(['createdAt','updatedAt','followUpDate'].includes(sortConfig.key)) {
          const av=a[sortConfig.key]?new Date(a[sortConfig.key]):new Date(0);
          const bv=b[sortConfig.key]?new Date(b[sortConfig.key]):new Date(0);
          return sortConfig.direction==='asc'?av-bv:bv-av;
        }
        return sortConfig.direction==='asc'?(a[sortConfig.key]||'').localeCompare(b[sortConfig.key]||''):(b[sortConfig.key]||'').localeCompare(a[sortConfig.key]||'');
      });

      const totalPages = Math.ceil(sortedData.length/itemsPerPage);
      const paginatedData = sortedData.slice((currentPage-1)*itemsPerPage, currentPage*itemsPerPage);
      const activeFilterCount = filters.fieldOfficers.length+filters.backOfficeUsers.length+Object.values(dateFilters).filter(Boolean).length;

      return (
        <div className="bg-[#1e2d3d]/50 rounded-2xl border border-[#2d3f52] overflow-hidden">
          <div className="p-4 border-b border-[#2d3f52] space-y-4">
            <div className="flex items-center gap-4">
              <div className="relative flex-1 max-w-md">
                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"><Icon name="search" size={18} /></div>
                <input type="text" placeholder="Search by phone, name, or ID..." value={searchTerm} onChange={e=>{setSearchTerm(e.target.value);setCurrentPage(1);}} className="w-full pl-10 pr-10 py-2.5 bg-[#253040] border border-[#354e63] rounded-xl text-sm text-white placeholder:text-slate-500" />
                {searchTerm&&<button onClick={()=>setSearchTerm('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white"><Icon name="x" size={16} /></button>}
              </div>
              <SortDropdown sortConfig={sortConfig} setSortConfig={setSortConfig} options={sortOptions} />
              <button onClick={()=>setShowFilters(!showFilters)} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium ${showFilters||activeFilterCount>0?'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30':'bg-[#253040] text-slate-400 border border-[#354e63] hover:text-white'}`}><Icon name="filter" size={18} /> Filters {activeFilterCount>0&&`(${activeFilterCount})`}</button>
            </div>
            {showFilters&&(
              <div className="space-y-3">
                <div className="flex items-center gap-3 flex-wrap">
                  <MultiSelectDropdown label="Field Officer" options={fieldOfficers} selected={filters.fieldOfficers} onChange={val=>setFilters({...filters,fieldOfficers:val})} />
                  <MultiSelectDropdown label="Back Office" options={backOfficeUsers} selected={filters.backOfficeUsers} onChange={val=>setFilters({...filters,backOfficeUsers:val})} />
                </div>
                <div className="flex items-center gap-4 flex-wrap">
                  <DateFilter label="Created From" value={dateFilters.createdFrom} onChange={v=>setDateFilters({...dateFilters,createdFrom:v})} />
                  <DateFilter label="Created To" value={dateFilters.createdTo} onChange={v=>setDateFilters({...dateFilters,createdTo:v})} />
                  <DateFilter label="Updated From" value={dateFilters.updatedFrom} onChange={v=>setDateFilters({...dateFilters,updatedFrom:v})} />
                  <DateFilter label="Updated To" value={dateFilters.updatedTo} onChange={v=>setDateFilters({...dateFilters,updatedTo:v})} />
                  {(activeFilterCount>0||statusFilter)&&<button onClick={()=>{setFilters({fieldOfficers:[],backOfficeUsers:[]});setDateFilters({createdFrom:null,createdTo:null,updatedFrom:null,updatedTo:null});onStatusFilterChange(null);}} className="flex items-center gap-1 px-3 py-2 rounded-lg text-sm text-red-400 hover:bg-red-500/10"><Icon name="x" size={14} /> Clear All</button>}
                </div>
              </div>
            )}
          </div>
          <div className="overflow-x-auto scrollbar-thin">
            <table className="w-full">
              <thead><tr className="border-b border-[#2d3f52]">
                <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">User ID</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Name</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Phone</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Product</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Status</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Assignees</th>
                <th className="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Dates</th>
              </tr></thead>
              <tbody className="divide-y divide-slate-800/50">
                {paginatedData.map(item => (
                  <tr key={item.id} onClick={()=>onRowClick(item)} className="hover:bg-[#253040]/30 cursor-pointer">
                    <td className="px-4 py-4 text-sm"><span className="text-emerald-400 font-mono">{item.id}</span></td>
                    <td className="px-4 py-4 text-sm text-white font-medium">{item.name}</td>
                    <td className="px-4 py-4 text-sm text-slate-300 font-mono">{item.phone}</td>
                    <td className="px-4 py-4 text-sm"><p className="text-white">{item.productType}</p><p className="text-xs text-slate-500">{item.brand}</p></td>
                    <td className="px-4 py-4 text-sm"><StatusBadge status={item.status} /></td>
                    <td className="px-4 py-4 text-sm">
                      <div className="space-y-0.5">
                        <p className="text-xs"><span className="text-slate-500">FO: </span><span className={item.fieldOfficer?'text-slate-300':'text-amber-400 italic'} >{item.fieldOfficer||'Unassigned'}</span></p>
                        <p className="text-xs"><span className="text-slate-500">RO: </span><span className={item.recoveryOfficer?'text-slate-300':'text-amber-400 italic'} >{item.recoveryOfficer||'Unassigned'}</span></p>
                        <p className="text-xs"><span className="text-slate-500">BO: </span><span className={item.backOfficeUser?'text-slate-300':'text-amber-400 italic'} >{item.backOfficeUser||'Unassigned'}</span></p>
                      </div>
                    </td>
                    <td className="px-4 py-4 text-sm">
                      <div className="space-y-0.5">
                        <p className="text-xs text-slate-400">Created: <span className="text-slate-300">{formatDate(item.createdAt)}</span></p>
                        <p className="text-xs text-slate-400">Updated: <span className="text-slate-300">{formatDate(item.updatedAt)}</span></p>
                        <p className="text-xs text-slate-400">Follow-up: <span className={item.followUpDate?'text-cyan-400':'text-slate-600'}>{item.followUpDate?formatDate(item.followUpDate):'—'}</span></p>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="px-4 py-3 border-t border-[#2d3f52] flex items-center justify-between">
            <p className="text-sm text-slate-500">Showing {(currentPage-1)*itemsPerPage+1}–{Math.min(currentPage*itemsPerPage, sortedData.length)} of {sortedData.length}</p>
            <div className="flex items-center gap-2">
              <button onClick={()=>setCurrentPage(p=>Math.max(1,p-1))} disabled={currentPage===1} className="p-2 rounded-lg bg-[#253040] text-slate-400 disabled:opacity-50"><Icon name="chevron-left" size={18} /></button>
              {Array.from({length:Math.min(5,totalPages)},(_,i)=>i+1).map(p=>(<button key={p} onClick={()=>setCurrentPage(p)} className={`w-9 h-9 rounded-lg text-sm font-medium ${currentPage===p?'bg-emerald-500/20 text-emerald-400':'bg-[#253040] text-slate-400'}`}>{p}</button>))}
              <button onClick={()=>setCurrentPage(p=>Math.min(totalPages,p+1))} disabled={currentPage===totalPages} className="p-2 rounded-lg bg-[#253040] text-slate-400 disabled:opacity-50"><Icon name="chevron-right" size={18} /></button>
            </div>
          </div>
        </div>
      );
    };

    // ─── Document Viewer with AID/AVD split ────────────────────────────────
    const DocumentSection = ({ title, subsectionKey, documents, onUpload, onDelete, sectionStatus, sectionComment, onStatusChange, onCommentChange, canEdit, showStatusControls }) => {
      const [viewMode, setViewMode] = useState('list');
      const [deleteConfirm, setDeleteConfirm] = useState({ isOpen:false, docId:null, fileId:null, docName:'', fileName:'' });
      const fileInputRef = useRef(null);
      const [selectedDoc, setSelectedDoc] = useState(null);
      const [pendingStatus, setPendingStatus] = useState(sectionStatus);
      const [pendingComment, setPendingComment] = useState(sectionComment);

      const renderPreview = (file) => {
        const name=(file?.name||'').toLowerCase();
        const isImage = ['png','jpg','jpeg','webp'].some(e=>name.endsWith('.'+e));
        const isPdf = name.endsWith('.pdf');
        const makeSvg = (label,kind) => `data:image/svg+xml;charset=utf-8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b1220"/><stop offset="100%" stop-color="#111827"/></linearGradient></defs><rect width="100%" height="100%" fill="url(#g)"/><rect x="70" y="70" width="1260" height="760" rx="28" fill="#0f172a" stroke="#334155" stroke-width="4"/><text x="120" y="170" fill="#e2e8f0" font-family="Arial" font-size="44" font-weight="700">${label}</text><text x="120" y="235" fill="#94a3b8" font-family="Arial" font-size="22">${kind}</text></svg>`)}`;
        const previewUrl = file?.url||(isImage?makeSvg(file?.name||'Image','Mock image preview (prototype)'):null);
        if (isImage) return <img alt={file.name} src={previewUrl} className="w-full h-auto object-contain rounded-lg border border-[#354e63] bg-[#1e2d3d]" />;
        if (isPdf) return (
          <div className="w-full h-44 rounded-lg border border-[#354e63] bg-[#1e2d3d] flex items-center justify-center">
            <div className="text-center px-4"><div className="mx-auto w-12 h-12 rounded-xl bg-[#253040] border border-[#354e63] flex items-center justify-center text-slate-300"><Icon name="file-text" size={18} /></div><p className="mt-3 text-xs text-slate-300">{file?.name||'PDF'}</p><p className="mt-1 text-[11px] text-slate-600">PDF preview (prototype)</p></div>
          </div>
        );
        return <div className="w-full h-36 rounded-lg border border-[#354e63] bg-[#1e2d3d] flex items-center justify-center"><div className="text-center px-4"><Icon name="file" size={24} className="text-slate-500 mx-auto" /><p className="mt-2 text-xs text-slate-400">{file?.name}</p></div></div>;
      };

      return (
        <div className="rounded-xl border border-[#354e63] bg-[#253040]/20 overflow-hidden">
          <input type="file" multiple ref={fileInputRef} onChange={e=>{if(e.target.files.length&&selectedDoc){Array.from(e.target.files).forEach(f=>{try{f.__url=URL.createObjectURL(f);}catch(err){}onUpload(selectedDoc,f);});setSelectedDoc(null);}e.target.value='';}} accept=".pdf,.jpg,.jpeg,.png,.webp,.xls,.xlsx,.csv" className="hidden"/>
          <DeleteConfirmModal isOpen={deleteConfirm.isOpen} onClose={()=>setDeleteConfirm({isOpen:false,docId:null,fileId:null,docName:'',fileName:''})} onConfirm={()=>{onDelete(deleteConfirm.docId,deleteConfirm.fileId);setDeleteConfirm({isOpen:false,docId:null,fileId:null,docName:'',fileName:''})} } documentName={deleteConfirm.docName} fileName={deleteConfirm.fileName} />

          {/* Header */}
          <div className="flex items-center justify-between p-4 border-b border-[#354e63]/50">
            <div className="flex items-center gap-3">
              <h4 className="text-sm font-semibold text-white">{title}</h4>
              {showStatusControls && <DocStatusBadge status={sectionStatus} />}
            </div>
            <div className="flex items-center gap-2">
              <div className="flex items-center gap-1 bg-[#253040] rounded-lg p-1">
                <button onClick={()=>setViewMode('list')} className={`px-3 py-1 rounded text-xs font-medium ${viewMode==='list'?'bg-emerald-500/20 text-emerald-400':'text-slate-400'}`}>List</button>
                <button onClick={()=>setViewMode('preview')} className={`px-3 py-1 rounded text-xs font-medium ${viewMode==='preview'?'bg-emerald-500/20 text-emerald-400':'text-slate-400'}`}>Preview</button>
              </div>
            </div>
          </div>

          {/* Status & Comment Controls (ARO view) */}
          {showStatusControls && (
            <div className="p-4 border-b border-[#354e63]/50 bg-[#253040]/30 space-y-3">
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-3">
                <div>
                  <label className="text-xs text-slate-500 block mb-1.5">Review Status</label>
                  <select value={pendingStatus} onChange={e=>setPendingStatus(e.target.value)} disabled={!canEdit} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white disabled:opacity-60">
                    {['Upload Pending','In Review','Sent Back','Approved'].map(s=><option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-xs text-slate-500 block mb-1.5">Comment {pendingStatus==='Sent Back'&&<span className="text-red-400">*</span>}</label>
                  <input type="text" value={pendingComment} onChange={e=>setPendingComment(e.target.value)} disabled={!canEdit} placeholder={canEdit?"Add comment...":"View only"} className="w-full px-3 py-2 bg-[#253040] border border-[#354e63] rounded-lg text-sm text-white placeholder:text-slate-500 disabled:opacity-60" />
                </div>
              </div>
              {canEdit&&<div className="flex justify-end">
                <button onClick={()=>{onStatusChange(pendingStatus);onCommentChange(pendingComment);}} disabled={pendingStatus===sectionStatus&&pendingComment===sectionComment} className="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-gradient-to-r from-emerald-500 to-cyan-500 text-white text-xs font-medium disabled:opacity-50"><Icon name="check" size={13}/>Update Status</button>
              </div>}
            </div>
          )}

          {/* Document List */}
          <div className="p-4 space-y-3">
            {documents.map(doc => (
              <div key={doc.id} className={`rounded-xl border ${doc.files?.length>0?'bg-[#253040]/30 border-[#354e63]':'bg-[#253040]/10 border-[#354e63]/50'}`}>
                <div className="flex items-center justify-between p-3">
                  <div className="flex items-center gap-3">
                    {doc.files?.length>0 ? <Icon name="circle-check" size={18} className="text-emerald-400" /> : <div className="w-5 h-5 rounded-full border-2 border-[#455e72]" />}
                    <span className="text-sm font-medium text-white">{doc.name}</span>
                    {doc.files?.length>0&&<span className="text-xs text-slate-500">({doc.files.length})</span>}
                  </div>
                  {canEdit && (
                    <button onClick={()=>{setSelectedDoc(doc.id);fileInputRef.current?.click();}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-[#2d3f52]/50 text-slate-400 hover:text-white text-sm">
                      <Icon name="upload" size={14} /> Upload
                    </button>
                  )}
                </div>
                {doc.files?.length>0 && viewMode==='list' && (
                  <div className="border-t border-[#354e63]/50 px-3 pb-3">
                    {doc.files.map(file=>(
                      <div key={file.id} className="flex items-center justify-between py-2 pl-8 border-b border-[#354e63]/30 last:border-0">
                        <div className="flex items-center gap-2"><Icon name="file" size={14} className="text-slate-500"/><span className="text-sm text-slate-300">{file.name}</span></div>

                          <button className="flex items-center gap-1 px-2 py-1 rounded text-xs text-emerald-400 hover:bg-emerald-500/10"><Icon name="download" size={14}/> Download</button>

                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {doc.files?.length>0 && viewMode==='preview' && (
                  <div className="border-t border-[#354e63]/50 px-3 pb-4 pt-4">

                      {doc.files.map(file=>(
                        <div key={file.id} className="space-y-2">

                              <button className="px-2 py-1 rounded text-xs text-emerald-400 hover:bg-emerald-500/10">Download</button>
                              {canEdit&&<button onClick={()=>setDeleteConfirm({isOpen:true,docId:doc.id,fileId:file.id,docName:doc.name,fileName:file.name})} className="px-2 py-1 rounded text-xs text-red-400 hover:bg-red-500/10">Delete</button>}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ─── Credit Doc Section (unified bureau + ops-uploaded docs) ─────────────
    // NOTE: Defined outside CreditReviewPanel to avoid remount-on-render bug.
    const CreditDocSection = ({ applicationId, entityLabel, bureauCsvFile, bureauCsvBvn, pullDocs, opsDocuments, onUpload, onDelete, canEdit, isBeforeCreditReview }) => {
      const [viewMode, setViewMode] = useState('list');
      const [deleteConfirm, setDeleteConfirm] = useState({ isOpen:false, fileId:null, fileName:'' });
      const fileInputRef = useRef(null);

      const handleCsvDownload = () => {
        const csv = `bureau,bvn,score,total_loans,active_loans,overdue_loans,outstanding_balance,worst_status\nCRC,${bureauCsvBvn||'00000000000'},720,5,2,0,450000,Current\nFirstCentral,${bureauCsvBvn||'00000000000'},685,3,1,0,120000,Current\nCreditRegistry,${bureauCsvBvn||'00000000000'},701,4,2,0,280000,Current\n`;
        const blob = new Blob([csv],{type:'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href=url; a.download=bureauCsvFile||`Bureau_Data_${entityLabel}_${applicationId}.csv`; a.click();
        URL.revokeObjectURL(url);
      };

      const renderPreview = (file) => {
        const name=(file?.name||'').toLowerCase();
        const isImg=['png','jpg','jpeg','webp'].some(e=>name.endsWith('.'+e));
        const isPdf=name.endsWith('.pdf');
        const isCsv=name.endsWith('.csv');
        const makeSvg=(label)=>`data:image/svg+xml;charset=utf-8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600"><rect width="100%" height="100%" fill="#0f172a"/><rect x="60" y="60" width="1280" height="480" rx="20" fill="#1e293b" stroke="#334155" stroke-width="3"/><text x="100" y="160" fill="#e2e8f0" font-family="Arial" font-size="40" font-weight="700">${label}</text><text x="100" y="220" fill="#94a3b8" font-family="Arial" font-size="20">Mock preview (prototype)</text></svg>`)}`;
        if(isImg) return <img alt={file.name} src={file?.url||makeSvg(file?.name||'Image')} className="w-full h-auto object-contain rounded-lg border border-[#354e63] bg-[#1e2d3d]"/>;
        const iconName=isPdf?'file-text':isCsv?'file-text':'file';
        const iconColor=isCsv?'text-blue-400':'text-slate-400';
        const bg=isCsv?'border-blue-700/30 bg-blue-900/10':'border-[#354e63] bg-[#1e2d3d]';
        return <div className={`w-full h-36 rounded-lg border ${bg} flex items-center justify-center`}><div className="text-center"><Icon name={iconName} size={24} className={`${iconColor} mx-auto`}/><p className="mt-2 text-xs text-slate-300">{file?.name}</p><p className="mt-1 text-xs text-slate-600">{isCsv?'Bureau Data CSV':'PDF preview (prototype)'}</p></div></div>;
      };

      const FileRow = ({ file, onDownload, showDelete }) => (
        viewMode==='list'
          ? <div className="flex items-center justify-between px-3 py-2.5">
              <div className="flex items-center gap-2 min-w-0">
                <Icon name="file" size={14} className="text-slate-500 flex-shrink-0"/>
                <span className="text-sm text-slate-200 truncate">{file.name}</span>
              </div>
              <div className="flex items-center gap-1 flex-shrink-0 ml-2">
                <button onClick={onDownload} className="flex items-center gap-1 px-2 py-1 rounded text-xs text-emerald-400 hover:bg-emerald-500/10"><Icon name="download" size={13}/>Download</button>
                {showDelete && <button onClick={()=>setDeleteConfirm({isOpen:true,fileId:file.id,fileName:file.name})} className="flex items-center gap-1 px-2 py-1 rounded text-xs text-red-400 hover:bg-red-500/10"><Icon name="trash-2" size={13}/>Delete</button>}
              </div>
            </div>
          : <div className="p-3 space-y-2">
              {renderPreview(file)}
              <div className="flex items-center justify-between">
                <span className="text-xs text-slate-400 truncate pr-2">{file.name}</span>
                <div className="flex gap-1 flex-shrink-0">
                  <button onClick={onDownload} className="px-2 py-1 rounded text-xs text-emerald-400 hover:bg-emerald-500/10">Download</button>
                  {showDelete && <button onClick={()=>setDeleteConfirm({isOpen:true,fileId:file.id,fileName:file.name})} className="px-2 py-1 rounded text-xs text-red-400 hover:bg-red-500/10">Delete</button>}
                </div>
              </div>
            </div>
      );

      const hasBureauData = !isBeforeCreditReview && (bureauCsvFile || pullDocs.length > 0);

      return (
        <div className="rounded-xl border border-[#354e63] bg-[#253040]/20 overflow-hidden">
          <input type="file" multiple ref={fileInputRef} onChange={e=>{if(e.target.files.length){Array.from(e.target.files).forEach(f=>{try{f.__url=URL.createObjectURL(f);}catch(err){}onUpload(f);});} e.target.value='';}} accept=".pdf,.jpg,.jpeg,.png,.webp,.xls,.xlsx,.csv" className="hidden"/>
          <DeleteConfirmModal isOpen={deleteConfirm.isOpen} onClose={()=>setDeleteConfirm({isOpen:false,fileId:null,fileName:''})} onConfirm={()=>{onDelete(deleteConfirm.fileId);setDeleteConfirm({isOpen:false,fileId:null,fileName:''});}} documentName={`${entityLabel} Credit Docs`} fileName={deleteConfirm.fileName}/>

          {/* Header */}
          <div className="flex items-center justify-between p-4 border-b border-[#354e63]/50">
            <h4 className="text-sm font-semibold text-white">{entityLabel} — Documents</h4>
            <div className="flex items-center gap-1 bg-[#253040] rounded-lg p-1">
              <button onClick={()=>setViewMode('list')} className={`px-3 py-1 rounded text-xs font-medium ${viewMode==='list'?'bg-emerald-500/20 text-emerald-400':'text-slate-400'}`}>List</button>
              <button onClick={()=>setViewMode('preview')} className={`px-3 py-1 rounded text-xs font-medium ${viewMode==='preview'?'bg-emerald-500/20 text-emerald-400':'text-slate-400'}`}>Preview</button>
            </div>
          </div>

          {isBeforeCreditReview && (
            <div className="flex items-center gap-2 p-6 justify-center">
              <Icon name="lock" size={14} className="text-slate-600"/>
              <p className="text-xs text-slate-500">Documents available from Credit Review status onwards.</p>
            </div>
          )}

          {!isBeforeCreditReview && (
            <div className="divide-y divide-slate-700/50">

              {/* Sub-section 1: Bureau Data */}
              <div className="p-4">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-xs font-semibold text-blue-400 uppercase tracking-wide">Bureau Data</span>
                  <span className="text-xs text-slate-600">download only</span>
                </div>
                {!hasBureauData && <p className="text-xs text-slate-500">No bureau data yet. Trigger a pull above.</p>}
                {hasBureauData && (
                  <div className="space-y-1.5">
                    {pullDocs.slice(-1).map(file=>(
                      <div key={file.id} className="rounded-lg border bg-blue-900/10 border-blue-700/30 overflow-hidden">
                        <FileRow file={file} onDownload={()=>{}} showDelete={false}/>
                      </div>
                    ))}
                    {bureauCsvFile && (
                      <div className="rounded-lg border bg-blue-900/10 border-blue-700/30 overflow-hidden">
                        <FileRow file={{id:'bureau-csv', name: bureauCsvFile}} onDownload={handleCsvDownload} showDelete={false}/>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Sub-section 2: Uploaded Documents */}
              <div className="p-4">
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <span className="text-xs font-semibold text-slate-300 uppercase tracking-wide">Uploaded Documents</span>
                    <span className="text-xs text-slate-600">ARO, UW, OM, FM, Admin Head</span>
                  </div>
                  {canEdit && (
                    <button onClick={()=>fileInputRef.current?.click()} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-[#2d3f52]/50 text-slate-400 hover:text-white text-xs border border-[#354e63]">
                      <Icon name="upload" size={13}/>Upload
                    </button>
                  )}
                </div>
                {opsDocuments.length === 0 && <p className="text-xs text-slate-500">No documents uploaded yet.</p>}
                {opsDocuments.length > 0 && (
                  <div className="space-y-1.5">
                    {opsDocuments.map(file=>(
                      <div key={file.id} className="rounded-lg border bg-[#253040]/30 border-[#354e63]/60 overflow-hidden">
                        <FileRow file={file} onDownload={()=>{}} showDelete={canEdit}/>
                      </div>
                    ))}
                  </div>
                )}
              </div>

            </div>
          )}
        </div>
      );
    };

        // ─── Credit Review Panel ─────────────────────────────────────────────────
    const CreditReviewPanel = ({ applicationId, customerBvn, customerPullDocs, customerOpsDocs, onCustomerUpload, onCustomerDelete, customerPullStatus, onTriggerCustomerPull, customerBureauCsv, guarantorOpsDocs, onGuarantorUpload, onGuarantorDelete, guarantorPullDocs, guarantorBvn, setGuarantorBvn, guarantorPullStatus, onTriggerGuarantorPull, guarantorBureauCsv, applicationStatus, isReadOnly, canEditDocs }) => {
      const [subTab, setSubTab] = useState('customer');

      const statusOrder = ['Created','In Progress','Application Review','Credit Review','Approved','Loan Ready','Disbursed','Rejected'];
      const statusIdx = statusOrder.indexOf(applicationStatus);
      const isBeforeCreditReview = statusIdx < 3;
      const isCreditReview = statusIdx === 3;
      const isAfterCreditReview = statusIdx >= 4;
      const canTriggerPull = isCreditReview && canEditDocs;

      const pullChipCls = (ps) => {
        if(ps==='loading') return { text:'Pulling bureau data…', cls:'bg-blue-500/15 text-blue-300 border-blue-500/25' };
        if(ps==='done') return { text:'Last pull: just now', cls:'bg-emerald-500/15 text-emerald-300 border-emerald-500/25' };
        if(ps==='error') return { text:'Enter a valid 11-digit BVN', cls:'bg-red-500/15 text-red-300 border-red-500/25' };
        return { text:'No pull yet', cls:'bg-slate-500/15 text-slate-300 border-slate-500/25' };
      };

      // Render bureau pull card — plain JSX, NOT a nested component, to avoid focus/remount bug
      const renderBureauPull = (isCustomer, bvnValue, pullStatus, onTrigger) => {
        const chip = pullChipCls(pullStatus);
        if(isBeforeCreditReview) return (
          <div className="p-4 rounded-xl bg-[#253040]/30 border border-[#354e63]/50 opacity-50">
            <div className="flex items-center gap-2 mb-3"><Icon name="lock" size={13} className="text-slate-500"/><p className="text-xs text-slate-500">Bureau pull available from Credit Review status onwards.</p></div>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-3 items-end">
              <div className="lg:col-span-2">
                <label className="text-xs text-slate-500 block mb-1">{isCustomer?'Customer BVN':'Guarantor BVN'}</label>
                <div className="w-full bg-[#1e2d3d]/40 border border-[#354e63]/50 rounded-xl px-3 py-2 text-sm text-slate-500">—</div>
              </div>
              <button disabled className="w-full lg:w-auto px-4 py-2 rounded-xl text-sm font-medium border bg-[#253040] text-slate-600 border-[#354e63] cursor-not-allowed"><Icon name="zap" size={14} className="inline mr-2"/>Trigger Bureau Pull</button>
            </div>
          </div>
        );
        if(isAfterCreditReview) return (
          <div className="p-4 rounded-xl bg-[#253040]/30 border border-[#354e63]/50">
            <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 mb-2">
              <div><label className="text-xs text-slate-500 block mb-1">{isCustomer?'Customer BVN':'Guarantor BVN'}</label><p className="text-sm text-white font-mono">{bvnValue||'—'}</p></div>
              <div><label className="text-xs text-slate-500 block mb-1">Pull Status</label><span className={`inline-block px-2.5 py-1 rounded-full text-xs border ${chip.cls}`}>{chip.text}</span></div>
            </div>
            <p className="text-xs text-slate-500">Bureau pull locked — application is past Credit Review.</p>
          </div>
        );
        // Credit Review — fully interactive
        return (
          <div className="p-4 rounded-xl bg-[#253040]/30 border border-[#354e63] space-y-3">
            <div className="flex items-center justify-between">
              <p className="text-xs font-semibold text-slate-400 uppercase tracking-wide">Bureau Pull</p>
              <span className={`px-2.5 py-1 rounded-full text-xs border ${chip.cls}`}>{chip.text}</span>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-3 items-end">
              <div className="lg:col-span-2">
                <label className="text-xs text-slate-500 block mb-1">{isCustomer?'Customer BVN (pre-filled, non-editable)':'Guarantor BVN'}</label>
                {isCustomer
                  ? <div className="w-full bg-[#1e2d3d]/60 border border-[#354e63] rounded-xl px-3 py-2 text-sm text-white font-mono">{bvnValue||'—'}</div>
                  : <input type="text" value={bvnValue||''} onChange={e=>dispatch({type:'PATCH_APP_STORE',id:appId,patch:{guarantorBvn:e.target.value.replace(/\D/g,'').slice(0,11)}})} placeholder="Enter 11-digit BVN" className="w-full bg-[#1e2d3d]/60 border border-[#354e63] rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:ring-2 focus:ring-emerald-500/30"/>
                }
              </div>
              <button onClick={onTrigger} disabled={pullStatus==='loading'||!canTriggerPull} className={`w-full lg:w-auto px-4 py-2 rounded-xl text-sm font-medium border ${(pullStatus==='loading'||!canTriggerPull)?'bg-[#253040] text-slate-500 border-[#354e63] cursor-not-allowed':'bg-emerald-500/20 text-emerald-400 border-emerald-500/30 hover:bg-emerald-500/25'}`}>
                <Icon name="zap" size={14} className="inline mr-2"/>{pullStatus==='loading'?'Pulling…':'Trigger Bureau Pull'}
              </button>
            </div>
            <p className="text-xs text-slate-500">Pulls CRC / FirstCentral / CreditRegistry for the {isCustomer?'customer':'guarantor'}.</p>
          </div>
        );
      };

      return (
        <div className="space-y-6">
          <div className="flex items-center justify-between">
            <h3 className="text-lg font-semibold text-white">Credit Review</h3>
            {isBeforeCreditReview && <span className="px-3 py-1 rounded-full text-xs border bg-amber-500/15 text-amber-300 border-amber-500/25">Available from Credit Review status</span>}
          </div>
          <div className="flex gap-2">
            {['customer','guarantor'].map(t=><button key={t} onClick={()=>setSubTab(t)} className={`px-4 py-2 rounded-lg text-sm font-medium ${subTab===t?'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30':'bg-[#253040] text-slate-400 border border-[#354e63] hover:text-white'}`}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
          </div>
          {subTab==='customer'&&(
            <div className="space-y-4">
              {renderBureauPull(true, customerBvn, customerPullStatus, onTriggerCustomerPull)}
              <CreditDocSection applicationId={applicationId} entityLabel="Customer" subsectionKey="credit" bureauCsvFile={customerBureauCsv} bureauCsvBvn={customerBvn} pullDocs={customerPullDocs} opsDocuments={customerOpsDocs} onUpload={onCustomerUpload} onDelete={onCustomerDelete} canEdit={canEditDocs} isBeforeCreditReview={isBeforeCreditReview}/>
            </div>
          )}
          {subTab==='guarantor'&&(
            <div className="space-y-4">
              {renderBureauPull(false, guarantorBvn, guarantorPullStatus, onTriggerGuarantorPull)}
              <CreditDocSection applicationId={applicationId} entityLabel="Guarantor" subsectionKey="guarantor" bureauCsvFile={guarantorBureauCsv} bureauCsvBvn={guarantorBvn} pullDocs={guarantorPullDocs} opsDocuments={guarantorOpsDocs} onUpload={onGuarantorUpload} onDelete={onGuarantorDelete} canEdit={canEditDocs} isBeforeCreditReview={isBeforeCreditReview}/>
            </div>
          )}
        </div>
      );
    };

    // ─── Event Timeline ──────────────────────────────────────────────────────
    const EventTimeline = ({ events }) => {
      const colors = { blue:'bg-blue-500/20 text-blue-400', green:'bg-emerald-500/20 text-emerald-400', purple:'bg-violet-500/20 text-violet-400', gray:'bg-[#2d3f52]/50 text-slate-400' };
      return (
        <div className="space-y-4">
          <h3 className="text-lg font-semibold text-white">Activity History</h3>
          {events.map(evt=>(
            <div key={evt.id} className="flex items-start gap-3">
              <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${colors[evt.color]||colors.gray}`}><Icon name={evt.icon||'circle'} size={14} /></div>
              <div className="flex-1 min-w-0">
                <div className="flex items-start justify-between gap-2">
                  <div><p className="text-sm text-white">{evt.description}</p>{evt.comment&&<p className="text-sm text-slate-400 mt-1 italic">"{evt.comment}"</p>}</div>
                  <span className="text-xs text-slate-500 whitespace-nowrap">{formatDateTime(evt.timestamp)}</span>
                </div>
                <p className="text-xs text-slate-600 mt-1">by {evt.actor}</p>
              </div>
            </div>
          ))}
        </div>
      );
    };

    // ─── Contract Section ────────────────────────────────────────────────────
    const ContractSection = ({ contractFiles, onUpload, onDelete, canEdit }) => {
      const [viewMode, setViewMode] = useState('list');
      const [deleteConfirm, setDeleteConfirm] = useState({isOpen:false,fileId:null,fileName:''});
      const fileInputRef = useRef(null);

      const renderPreview = (file) => {
        const name=(file?.name||'').toLowerCase();
        const isImg=['png','jpg','jpeg','webp'].some(e=>name.endsWith('.'+e));
        const isPdf=name.endsWith('.pdf');
        const makeSvg=(label)=>`data:image/svg+xml;charset=utf-8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600"><rect width="100%" height="100%" fill="#0f172a"/><rect x="60" y="60" width="1280" height="480" rx="20" fill="#1e293b" stroke="#334155" stroke-width="3"/><text x="100" y="160" fill="#e2e8f0" font-family="Arial" font-size="40" font-weight="700">${label}</text><text x="100" y="220" fill="#94a3b8" font-family="Arial" font-size="20">Contract preview (prototype)</text></svg>`)}`;
        if(isImg) return <img alt={file.name} src={file.url||makeSvg(file.name)} className="w-full h-auto object-contain rounded-lg border border-[#354e63] bg-[#1e2d3d]"/>;
        return <div className={`w-full h-36 rounded-lg border ${isPdf?'border-violet-700/30 bg-violet-900/10':'border-[#354e63] bg-[#1e2d3d]'} flex items-center justify-center`}><div className="text-center"><Icon name="file-text" size={24} className={isPdf?'text-violet-400':'text-slate-400'} /><p className="mt-2 text-xs text-slate-300">{file.name}</p><p className="mt-1 text-xs text-slate-600">Preview (prototype)</p></div></div>;
      };

      return (
        <div className="rounded-xl border border-[#354e63] bg-[#253040]/20 overflow-hidden">
          <input type="file" multiple ref={fileInputRef} onChange={e=>{if(e.target.files.length){Array.from(e.target.files).forEach((f,i)=>{try{f.__url=URL.createObjectURL(f);}catch(err){}onUpload({id:`contract-${Date.now()}-${i}`,name:f.name,size:f.size,url:f.__url||null});});}e.target.value='';}} accept=".pdf,.jpg,.jpeg,.png,.webp" className="hidden"/>
          <DeleteConfirmModal isOpen={deleteConfirm.isOpen} onClose={()=>setDeleteConfirm({isOpen:false,fileId:null,fileName:''})} onConfirm={()=>{onDelete(deleteConfirm.fileId);setDeleteConfirm({isOpen:false,fileId:null,fileName:''}); }} documentName="Customer Contract" fileName={deleteConfirm.fileName}/>
          <div className="flex items-center justify-between p-4 border-b border-[#354e63]/50">
            <div className="flex items-center gap-3">
              <Icon name="file-signature" size={16} className="text-violet-400"/>
              <h4 className="text-sm font-semibold text-white">Customer Contract</h4>
              <span className="text-xs text-slate-500">— 1 document</span>
            </div>
            <div className="flex items-center gap-2">
              {canEdit && (
                <button onClick={()=>fileInputRef.current?.click()} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-[#2d3f52]/50 text-slate-400 hover:text-white text-xs border border-[#354e63]">
                  <Icon name="upload" size={13}/>Upload
                </button>
              )}
              <div className="flex items-center gap-1 bg-[#253040] rounded-lg p-1">
                <button onClick={()=>setViewMode('list')} className={`px-3 py-1 rounded text-xs font-medium ${viewMode==='list'?'bg-emerald-500/20 text-emerald-400':'text-slate-400'}`}>List</button>
                <button onClick={()=>setViewMode('preview')} className={`px-3 py-1 rounded text-xs font-medium ${viewMode==='preview'?'bg-emerald-500/20 text-emerald-400':'text-slate-400'}`}>Preview</button>

            </div>
          </div>

            {(!contractFiles||contractFiles.length===0) && (

                <p className="text-sm text-slate-500">No contract documents uploaded yet.</p>
                {canEdit&&<button onClick={()=>fileInputRef.current?.click()} className="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-violet-500/20 text-violet-400 border border-violet-500/30 text-sm font-medium hover:bg-violet-500/30"><Icon name="upload" size={14}/>Upload Contract</button>}

        // ─── Application Detail ──────────────────────────────────────────────────
    const ApplicationDetail = ({ application: initApp, onBack, currentUser }) => {
      const { state, dispatch } = useStore();

      // Always read the latest version of this application from the central store
      const application = state.applications.find(a => a.id === initApp.id) || initApp;
      const appId = application.id;

      // ── Bootstrap per-app sub-state on first open ──────────────────────────
      const statusOrder = ['Created','In Progress','Application Review','Credit Review','Approved','Loan Ready','Disbursed','Rejected'];
      const initStatusIdx = statusOrder.indexOf(application.status);
      const initAlreadyPulled = initStatusIdx >= 4;
      const mockPullDoc = (prefix, id) => [{id:`${prefix}-mock`,name:`${prefix}_Credit_Bureau_${id}.pdf`,size:1400,url:null}];

      useEffect(() => {
        dispatch({
          type: 'INIT_APP_STORE',
          id: appId,
          data: {
            aidDocs: generateMockDocuments(aidDocumentTypes, appId),
            avdDocs: generateMockDocuments(avdDocumentTypes, appId),
            contractFiles: [],
            events: generateMockEvents(appId),
            customerPullDocs: initAlreadyPulled ? mockPullDoc('Customer', appId) : [],
            customerOpsDocs: [],
            customerPullStatus: initAlreadyPulled ? 'done' : 'idle',
            customerBureauCsv: initAlreadyPulled ? `Bureau_Data_Customer_${appId}.csv` : null,
            guarantorPullDocs: initAlreadyPulled ? mockPullDoc('Guarantor', appId) : [],
            guarantorOpsDocs: [],
            guarantorPullStatus: initAlreadyPulled ? 'done' : 'idle',
            guarantorBureauCsv: initAlreadyPulled ? `Bureau_Data_Guarantor_${appId}.csv` : null,
            guarantorBvn: initAlreadyPulled ? `${Math.floor(Math.random()*90000000000+10000000000)}` : '',
            foUploadPermission: 'No',
          }
        });
      }, [appId]);

      // ── Read from store ────────────────────────────────────────────────────
      const appStore = state.appStore[appId] || {};
      const aidDocuments    = appStore.aidDocs || [];
      const avdDocuments    = appStore.avdDocs || [];
      const contractFiles   = appStore.contractFiles || [];
      const events          = appStore.events || [];
      const customerPullDocs    = appStore.customerPullDocs || [];
      const customerOpsDocs     = appStore.customerOpsDocs || [];
      const customerPullStatus  = appStore.customerPullStatus || 'idle';
      const customerBureauCsv   = appStore.customerBureauCsv || null;
      const guarantorPullDocs   = appStore.guarantorPullDocs || [];
      const guarantorOpsDocs    = appStore.guarantorOpsDocs || [];
      const guarantorPullStatus = appStore.guarantorPullStatus || 'idle';
      const guarantorBureauCsv  = appStore.guarantorBureauCsv || null;
      const guarantorBvn        = appStore.guarantorBvn || '';
      const foUploadPermission  = appStore.foUploadPermission || 'No';
      const aidStatus  = application.aidStatus  || 'Upload Pending';
      const avdStatus  = application.avdStatus  || 'Upload Pending';
      const aidComment = application.aidComment || '';
      const avdComment = application.avdComment || '';

      // ── Local UI-only state (not persisted across nav, that's fine) ────────
      const [activeSection, setActiveSection] = useState('details');
      const [isEditingDetails, setIsEditingDetails] = useState(false);
      const [editForm, setEditForm] = useState({ ...application });
      const [isEditingAssignees, setIsEditingAssignees] = useState(false);
      const [assigneeForm, setAssigneeForm] = useState({ fieldOfficer: application.fieldOfficer, recoveryOfficer: application.recoveryOfficer, backOfficeUser: application.backOfficeUser });
      const [newStatus, setNewStatus] = useState(application.status);
      const [statusComment, setStatusComment] = useState('');
      const [newComment, setNewComment] = useState('');
      const [activityTab, setActivityTab] = useState('status');
      const [docSubTab, setDocSubTab] = useState('aid');

      const role = currentUser?.role;
      const userRoles = currentUser?.roles || [role];

      // Disbursed apps are fully locked for everyone
      const isDisbursed = application.status === 'Disbursed';

      // External is always view-only (can see everything but cannot write)
      const isExternal = role === 'EXTERNAL';

      // Admin Ops is view-only for docs and activity (can only edit assignees)
      const isAdminOpsOnly = userRoles.includes('ADMIN_OPS') && !userRoles.includes('ADMIN_HEAD');

      // Hard lock: External OR Disbursed blocks all writes
      const isReadOnly = isExternal || isDisbursed;

      // Case Details editable: all roles except External, not if Disbursed
      const canEditDetails = !isReadOnly;

      // Assignees editable: Admin Ops + Admin Head only, not if locked
      const canEditAssignees = !isReadOnly && (userRoles.includes('ADMIN_OPS') || userRoles.includes('ADMIN_HEAD'));

      // Doc upload/delete: NOT External, NOT Disbursed (Admin Ops CAN upload/delete docs now)
      const canEditDocs = !isReadOnly;

      // Doc status controls (AID/AVD dropdown): ARO + Admin Head, not if locked, not Admin Ops
      const showStatusControls = canEditDocs && (userRoles.includes('ARO') || userRoles.includes('ADMIN_HEAD'));

      // Activity tab visible: everyone sees it unless Disbursed
      const showActivityTab = !isDisbursed;

      // Activity tab: status changes = not Admin Ops; comments = Admin Ops allowed
      const canUseActivity = !isReadOnly && !isAdminOpsOnly;
      const canAddComments = !isReadOnly && !isExternal;

      const sections = [
        { id:'details', label:'Case Details' },
        { id:'assignees', label:'Assignees' },
        { id:'documents', label:'Documents' },
        { id:'credit', label:'Credit Review' },

        { id:'accounts', label:'Accounts' },
        { id:'history', label:'History' },

      // ── All handlers dispatch to the global store ─────────────────────────
      const handleAidUpload = (docId, file) => dispatch({ type:'UPLOAD_DOC', appId, section:'aid', docId, file });
      const handleAidDelete = (docId, fileId) => dispatch({ type:'DELETE_DOC', appId, section:'aid', docId, fileId });
      const handleAvdUpload = (docId, file) => dispatch({ type:'UPLOAD_DOC', appId, section:'avd', docId, file });
      const handleAvdDelete = (docId, fileId) => dispatch({ type:'DELETE_DOC', appId, section:'avd', docId, fileId });
      const handleCreditUpload = (file) => dispatch({ type:'UPLOAD_CREDIT_OPS', appId, side:'customer', file });
      const handleCreditDelete = (fileId) => dispatch({ type:'DELETE_CREDIT_OPS', appId, side:'customer', fileId });
      const handleGuarantorUpload = (file) => dispatch({ type:'UPLOAD_CREDIT_OPS', appId, side:'guarantor', file });
      const handleGuarantorDelete = (fileId) => dispatch({ type:'DELETE_CREDIT_OPS', appId, side:'guarantor', fileId });

      const handleStatusUpdate = () => {
        dispatch({ type:'UPDATE_APP', id:appId, patch:{ status:newStatus } });
        dispatch({ type:'ADD_EVENT', appId, event:{id:`EVT-${Date.now()}`,icon:'circle-alert',color:'blue',description:`Status changed to ${newStatus}`,timestamp:new Date().toISOString(),actor:currentUser?.name||'System',comment:statusComment||null} });

        // ── Auto Assignment trigger ──────────────────────────────────────
        const autoStages = ['Application Review','Credit Review','Approved','Loan Ready'];
        if(autoStages.includes(newStatus)) {
          const alreadyAssigned = (state.assignedApps[appId] || []).includes(newStatus);
          if(!alreadyAssigned) {
            const stageCfg = state.assignmentConfig[newStatus];
            if(stageCfg) {
              // Get eligible users with weight > 0
              const eligible = state.users.filter(u => {
                const uRoles = u.roles || [u.role];
                return stageCfg.roles.some(r => uRoles.includes(r)) && (stageCfg.weights[u.id] || 0) > 0;
              });
              if(eligible.length > 0) {
                // Count existing assignments in mock data for proportional distribution
                // Key assignedCounts by user NAME (matches backOfficeUser field on applications)
                const assignedCounts = {};
                eligible.forEach(u => { assignedCounts[u.name] = 0; });
                state.applications.forEach(app => {
                  if(app.backOfficeUser && assignedCounts.hasOwnProperty(app.backOfficeUser)) {
                    assignedCounts[app.backOfficeUser]++;
                  }
                });
                // Pick user most under their weight target (weighted round robin)
                let bestUser = null, bestScore = -Infinity;
                const totalAssigned = Object.values(assignedCounts).reduce((a,b)=>a+b,0);
                eligible.forEach(u => {
                  const targetShare = (stageCfg.weights[u.id] || 0) / 100;
                  const actualShare = totalAssigned > 0 ? (assignedCounts[u.name] || 0) / totalAssigned : 0;
                  const score = targetShare - actualShare;
                  if(score > bestScore) { bestScore = score; bestUser = u; }
                });
                if(bestUser) {
                  dispatch({ type:'UPDATE_APP', id:appId, patch:{ backOfficeUser: bestUser.name } });
                  dispatch({ type:'RECORD_ASSIGNMENT', appId, stageId: newStatus });
                  dispatch({ type:'ADD_EVENT', appId, event:{
                    id:`EVT-${Date.now()+1}`,
                    icon:'user-check',
                    color:'green',
                    description:`Auto-assigned to ${bestUser.name}`,
                    timestamp:new Date().toISOString(),
                    actor:'System',
                    comment:`Stage: ${newStatus}`
                  }});
                }
              }
            }
          }
        }

        setStatusComment('');
      };
      const handleAddComment = () => {
        if(!newComment.trim()) return;
        dispatch({ type:'ADD_EVENT', appId, event:{id:`EVT-${Date.now()}`,icon:'message-square',color:'gray',description:'Comment Added',timestamp:new Date().toISOString(),actor:currentUser?.name||'System',comment:newComment} });
        setNewComment('');

      const triggerCustomerPull = () => {

        dispatch({ type:'PATCH_APP_STORE', id:appId, patch:{ guarantorPullStatus:'loading' } });
        setTimeout(()=>{

          dispatch({ type:'ADD_EVENT', appId, event:{id:`EVT-${Date.now()}`,icon:'file-search',color:'purple',description:'Guarantor credit bureau pulled',timestamp:new Date().toISOString(),actor:currentUser?.name||'System',comment:`BVN: ${guarantorBvn}`} });

      return (

            <button onClick={onBack} className="p-3 rounded-xl bg-[#253040] text-white hover:bg-[#2d3f52] border border-[#354e63]"><span className="text-white text-lg leading-none">←</span></button>
            <div>

              <p className="text-sm text-slate-500 mt-0.5">ID: {application.id} · Created {formatDate(application.createdAt)}</p>
            </div>
          </div>

          <div className="flex gap-1 border-b border-[#2d3f52] overflow-x-auto">
            {sections.map(s=><button key={s.id} onClick={()=>setActiveSection(s.id)} className={`px-4 py-2.5 text-sm font-medium whitespace-nowrap ${activeSection===s.id?'text-emerald-400 border-b-2 border-emerald-500 bg-[#253040]/30':'text-slate-400 hover:text-white'}`}>{s.label}</button>)}
          </div>


          <div className="bg-[#1e2d3d]/50 rounded-2xl border border-[#2d3f52] p-6">
            {/* ── Case Details ── */}
            {activeSection==='details'&&(
              <div className="space-y-6">
                <div className="flex items-center justify-between pb-4 border-b border-[#2d3f52]">

                  {canEditDetails&&<button onClick={()=>setIsEditingDetails(!isEditingDetails)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-medium ${isEditingDetails?'bg-amber-500/20 text-amber-400 border border-amber-500/30':'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'}`}><Icon name={isEditingDetails?'x':'pencil'} size={16}/>{isEditingDetails?'Cancel':'Edit Details'}</button>}
                  {isReadOnly&&<span className="text-xs text-slate-500 bg-[#253040] px-3 py-1.5 rounded-full border border-[#354e63]">{isDisbursed?"Disbursed — View Only":"View Only"}</span>}
